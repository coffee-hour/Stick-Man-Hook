<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏴‍☠️</text></svg>">
    <title>Swing!</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            user-select: none;
        }
        
        #main-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 1100px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        
        #sidebar {
            width: 260px;
            background: rgba(22, 36, 71, 0.9);
            border: 1px solid #1f4068;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            height: 700px;
            display: flex;
            flex-direction: column;
        }
        #sidebar h3 {
            margin: 0 0 15px 0;
            color: #f9a826;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 18px;
            text-align: center;
            border-bottom: 2px solid #1f4068;
            padding-bottom: 8px;
        }
        #leaderboardList {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #leaderboardList::-webkit-scrollbar { width: 6px; }
        #leaderboardList::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 4px; }
        #leaderboardList::-webkit-scrollbar-thumb { background: #f9a826; border-radius: 4px; }

        .leaderboard-item {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1f4068;
            font-size: 14px;
        }
        .leaderboard-rank { font-weight: bold; color: #00adb5; margin-right: 5px; }
        .leaderboard-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .leaderboard-score { color: #4ecca3; font-weight: bold; }

        #authContainer {
            background: rgba(22, 36, 71, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1f4068;
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
        }
        .auth-input { padding: 8px; border-radius: 4px; border: 1px solid #1a1a2e; background: #1a1a2e; color: white; width: 110px; }
        .auth-btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .auth-btn:hover { opacity: 0.8; }
        #loginBtn { background: #4ecca3; color: #1a1a2e; }
        #registerBtn { background: #00adb5; color: #fff; }
        #logoutBtn { background: #ff4757; color: #fff; display: none; }
        #welcomeMessage { display: none; font-weight: bold; color: #4ecca3; font-size: 16px; }
        #authInputs { display: flex; gap: 10px; }

        canvas {
            background: #162447;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            max-width: 800px;
            border: 2px solid #1f4068;
            transition: background 0.5s ease;
        }
        
        #ui {
            display: flex;
            gap: 15px;
            font-size: 15px;
            font-weight: bold;
            background: rgba(26, 26, 46, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #1f4068;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
        }
        .score-val { color: #4ecca3; }
        .high-val { color: #f9a826; }
        .skin-val { color: #00adb5; text-transform: capitalize; }
        .realm-val { color: #ff9ff3; text-transform: uppercase; }
        
        #shardDisplay { display: flex; gap: 15px; align-items: center; }
        .shard-counter { display: flex; align-items: center; gap: 5px; }
        .shard-icon { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #777; }
        .icon-white { background: #fff; box-shadow: 0 0 5px #fff; }
        .icon-black { background: #000; border-color: #fff; box-shadow: 0 0 5px #ff3838; }

        #bottom-panels {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .panel-box {
            background: rgba(22, 36, 71, 0.8);
            border: 1px solid #1f4068;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        #changingRoom { flex: 1.2; }
        #pirateBazaar { flex: 1; }
        #realmTravel { flex: 0.8; }
        
        .panel-box h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #1f4068;
            padding-bottom: 5px;
        }
        
        .skins-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-start;
            max-height: 120px; 
            overflow-y: auto;
            padding-right: 5px;
        }
        .skins-grid::-webkit-scrollbar { width: 8px; }
        .skins-grid::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 4px; }
        .skins-grid::-webkit-scrollbar-thumb { background: #00adb5; border-radius: 4px; }

        /* Changing Room Styles */
        .skin-btn {
            background: #1a1a2e; border: 2px solid #1f4068; color: #888;
            padding: 6px 10px; border-radius: 6px; cursor: not-allowed;
            font-size: 11px; font-weight: bold; display: flex; flex-direction: column;
            align-items: center; gap: 4px; min-width: 80px; transition: all 0.2s; position: relative;
        }
        .skin-btn.unlocked { border-color: #4ecca3; color: #fff; cursor: pointer; }
        .skin-btn.unlocked:hover { background: #1f4068; transform: translateY(-2px); }
        .skin-btn.equipped { border-color: #f9a826; background: #232342; color: #f9a826; }
        .skin-btn.sub-skin { border-style: dashed; background: #162447; transform: scale(0.95); }
        .skin-preview { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid rgba(255,255,255,0.2); }
        .ability-text { font-size: 9px; color: #ffeb3b; text-align: center; line-height: 1.1; margin-top: 2px;}

        .dropdown-arrow {
            position: absolute; top: -8px; right: -8px; background: #f9a826; color: #1a1a2e;
            border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex;
            justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10;
        }

        #fuseBtn {
            position: absolute; top: 10px; right: 15px;
            background: linear-gradient(90deg, #ffffff 50%, #000000 50%);
            color: #1a1a2e; border: 2px solid #f9a826; padding: 5px 10px; font-size: 11px;
            border-radius: 6px; font-weight: bold; cursor: pointer; display: none;
            text-shadow: 0px 0px 4px #fff; box-shadow: 0 0 10px #f9a826; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Pirate Bazaar Styles */
        .pirate-card {
            background: #1a1a2e; border: 1px solid #1f4068; padding: 6px;
            border-radius: 6px; display: flex; flex-direction: column; align-items: center;
            gap: 4px; width: 110px; transition: all 0.2s;
        }
        .pirate-card.unlocked { border-color: #4ecca3; }
        .pirate-card.equipped { border-color: #f9a826; background: #232342; }
        
        .pirate-name { font-size: 11px; font-weight: bold; text-align: center; color: #fff;}
        .pirate-ability { font-size: 9px; color: #4bcffa; text-align: center; height: 20px;}
        
        .buy-btn {
            background: #4bcffa; color: #1a1a2e; border: none; padding: 4px 6px;
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 10px;
            width: 100%; display: flex; justify-content: center; gap: 3px; align-items: center;
        }
        .buy-btn:hover { background: #0fbcf9; }
        .buy-btn:disabled { background: #333; color: #888; cursor: not-allowed; }
        .equip-btn {
            background: #4ecca3; color: #1a1a2e; border: none; padding: 4px;
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 10px; width: 100%;
        }

        /* Realm Travel Styles */
        .realm-btn {
            padding: 8px; border: 2px solid; border-radius: 6px; font-weight: bold; cursor: pointer;
            text-align: center; font-size: 11px; margin-bottom: 8px; transition: transform 0.1s;
        }
        .realm-btn:active { transform: scale(0.95); }
        #btnMainRealm { background: #1f4068; color: white; border-color: #4ecca3; }
        #btnSkyRealm { background: #e0f7fa; color: #006064; border-color: #00bcd4; }
        #btnUnderworld { background: #212121; color: #ff5252; border-color: #d50000; }
        .realm-btn.active-realm { box-shadow: 0 0 15px currentColor; }

        /* Toast Notification System */
        #toastContainer {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 1000; pointer-events: none;
        }
        .toast {
            background: rgba(22, 36, 71, 0.95); border: 2px solid #4ecca3; color: #fff;
            padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: fadeInOut forwards;
            text-align: center; white-space: pre-wrap;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <div id="main-layout">
        <div id="game-container">
            <div id="authContainer">
                <div>☁️ Local Save</div>
                <div id="authInputs">
                    <input type="text" id="usernameInput" class="auth-input" placeholder="Username">
                    <input type="password" id="passwordInput" class="auth-input" placeholder="Password">
                    <button id="loginBtn" class="auth-btn">Login</button>
                    <button id="registerBtn" class="auth-btn">Register</button>
                </div>
                <div id="welcomeMessage"></div>
                <button id="logoutBtn" class="auth-btn">Logout</button>
            </div>

            <div id="ui">
                <div>Score: <span id="scoreDisplay" class="score-val">0</span></div>
                <div>High: <span id="highScoreDisplay" class="high-val">0</span></div>
                <div>Realm: <span id="realmDisplay" class="realm-val">Main</span></div>
                <div>Skin: <span id="skinDisplay" class="skin-val">Default</span></div>
                <div id="shardDisplay">
                    <div class="shard-counter">
                        <div class="shard-icon icon-white" title="White Shards"></div>
                        <span id="whiteShardDisplay">0</span>
                    </div>
                    <div class="shard-counter">
                        <div class="shard-icon icon-black" title="Black Shards"></div>
                        <span id="blackShardDisplay">0</span>
                    </div>
                </div>
            </div>

            <canvas id="gameCanvas" width="800" height="420"></canvas>

            <div id="bottom-panels">
                <div id="changingRoom" class="panel-box">
                    <h3>👕 Changing Room</h3>
                    <button id="fuseBtn">FUSE?</button>
                    <div class="skins-grid" id="skinsGrid"></div>
                </div>

                <div id="pirateBazaar" class="panel-box">
                    <h3>🏴‍☠️ Pirate Bazaar</h3>
                    <div class="skins-grid" id="bazaarGrid"></div>
                </div>

                <div id="realmTravel" class="panel-box">
                    <h3>🌌 Travel</h3>
                    <div id="btnMainRealm" class="realm-btn active-realm" onclick="changeRealm('main')">Grand Line (Main)</div>
                    <div id="btnSkyRealm" class="realm-btn" onclick="changeRealm('sky')">Sky Island (White)</div>
                    <div id="btnUnderworld" class="realm-btn" onclick="changeRealm('underworld')">Underworld (Black)</div>
                </div>
            </div>
        </div>

        <div id="sidebar">
            <h3>🏆 Leaderboard</h3>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <script>
        // --- TOAST NOTIFICATIONS ---
        function showToast(message, duration = 4000, borderColor = "#4ecca3") {
            const container = document.getElementById("toastContainer");
            if (!container) return;
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.style.borderColor = borderColor;
            toast.style.animationDuration = (duration / 1000) + "s";
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentElement) toast.remove(); }, duration);
        }

        // --- LOCAL AUTH & SAVE SYSTEM ---
        let currentUser = localStorage.getItem("active_user") || null;
        
        function getSaveKey(key) {
            return currentUser ? `sh_${currentUser}_${key}` : `sh_guest_${key}`;
        }

        let unlockedSkinsArray = [];
        let highScore = 0; let whiteShards = 0; let blackShards = 0; let equippedSkin = "default";
        
        function loadData() {
            unlockedSkinsArray = JSON.parse(localStorage.getItem(getSaveKey("skins"))) || ["default"];
            highScore = parseInt(localStorage.getItem(getSaveKey("high"))) || 0;
            whiteShards = parseInt(localStorage.getItem(getSaveKey("white"))) || 0;
            blackShards = parseInt(localStorage.getItem(getSaveKey("black"))) || 0;
            
            // Safely fetch equipped skin, fall back to "default" if null or corrupted
            equippedSkin = localStorage.getItem(getSaveKey("equipped"));
            if (!equippedSkin || equippedSkin === "null" || equippedSkin === "undefined") {
                equippedSkin = "default";
            }
            
            document.getElementById("highScoreDisplay").textContent = highScore;
            updateUI(); renderChangingRoom(); renderBazaar(); updateLocalLeaderboard(); applySkinAbilities();
        }

        function saveLocalData() {
            localStorage.setItem(getSaveKey("high"), highScore);
            localStorage.setItem(getSaveKey("white"), whiteShards);
            localStorage.setItem(getSaveKey("black"), blackShards);
            localStorage.setItem(getSaveKey("equipped"), equippedSkin);
            localStorage.setItem(getSaveKey("skins"), JSON.stringify(unlockedSkinsArray));
            updateUI(); updateLocalLeaderboard();
        }

        // Setup Auth UI
        const authInputs = document.getElementById("authInputs");
        const welcomeMessage = document.getElementById("welcomeMessage");
        const logoutBtn = document.getElementById("logoutBtn");

        function updateAuthUI() {
            if (currentUser) {
                authInputs.style.display = "none";
                welcomeMessage.style.display = "block";
                logoutBtn.style.display = "block";
                welcomeMessage.textContent = `Welcome, ${currentUser}!`;
            } else {
                authInputs.style.display = "flex";
                welcomeMessage.style.display = "none";
                logoutBtn.style.display = "none";
            }
            loadData();
        }

        document.getElementById("registerBtn").onclick = () => {
            const u = document.getElementById("usernameInput").value.trim();
            const p = document.getElementById("passwordInput").value;
            if(!u || !p) return showToast("Enter username and password", 3000, "#ff0055");
            if(localStorage.getItem("user_pw_" + u)) return showToast("User already exists!", 3000, "#ff0055");
            
            localStorage.setItem("user_pw_" + u, p);
            let users = JSON.parse(localStorage.getItem("all_users") || "[]");
            users.push(u); localStorage.setItem("all_users", JSON.stringify(users));

            currentUser = u; localStorage.setItem("active_user", u);
            updateAuthUI();
            showToast("Registration successful! Auto-logged in.", 3000);
        };

        document.getElementById("loginBtn").onclick = () => {
            const u = document.getElementById("usernameInput").value.trim();
            const p = document.getElementById("passwordInput").value;
            const savedPw = localStorage.getItem("user_pw_" + u);
            if(savedPw && savedPw === p) {
                currentUser = u; localStorage.setItem("active_user", u);
                updateAuthUI();
                showToast("Login Successful!", 3000);
            } else { showToast("Invalid username or password", 3000, "#ff0055"); }
        };

        logoutBtn.onclick = () => {
            currentUser = null; localStorage.removeItem("active_user");
            document.getElementById("usernameInput").value = "";
            document.getElementById("passwordInput").value = "";
            updateAuthUI();
            showToast("Logged out.", 3000, "#ffb142");
        };

        function updateLocalLeaderboard() {
            const leaderboardList = document.getElementById("leaderboardList");
            leaderboardList.innerHTML = "";
            let users = JSON.parse(localStorage.getItem("all_users") || "[]");
            
            let scores = users.map(u => ({
                username: u, 
                score: parseInt(localStorage.getItem(`sh_${u}_high`)) || 0 
            })).sort((a,b) => b.score - a.score).slice(0, 15);

            if (scores.length === 0) return leaderboardList.innerHTML = '<div style="text-align: center; color: #666; margin-top: 20px;">No registered users yet.</div>';
            
            scores.forEach((row, index) => {
                const item = document.createElement("div"); item.className = "leaderboard-item";
                if(currentUser && row.username === currentUser) { item.style.borderColor = "#4ecca3"; item.style.background = "#232342"; }
                item.innerHTML = `<div><span class="leaderboard-rank">#${index + 1}</span><span class="leaderboard-name">${row.username}</span></div><span class="leaderboard-score">${row.score}</span>`;
                leaderboardList.appendChild(item);
            });
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let currentRealm = 'main'; 
        let gameStatus = "playing";
        let flameOffset = 0;

        let fusionAngle = 0; let fusionSpeed = 0.05; let fusionDistance = 150; let fusionFlash = 0;
        let angelicDropdownOpen = false; let devilDropdownOpen = false;

        function changeRealm(realm) {
            currentRealm = realm;
            document.querySelectorAll('.realm-btn').forEach(btn => btn.classList.remove('active-realm'));
            
            if(realm === 'main') { 
                document.getElementById('btnMainRealm').classList.add('active-realm');
                canvas.style.background = "#162447"; 
                document.getElementById("realmDisplay").textContent = "Grand Line";
            }
            else if(realm === 'sky') { 
                document.getElementById('btnSkyRealm').classList.add('active-realm');
                canvas.style.background = "#87CEEB"; 
                document.getElementById("realmDisplay").textContent = "Sky Island";
            }
            else if(realm === 'underworld') { 
                document.getElementById('btnUnderworld').classList.add('active-realm');
                canvas.style.background = "#2b0a0a"; 
                document.getElementById("realmDisplay").textContent = "Underworld";
            }
            resetGame(); 
        }

        function updateUI() {
            document.getElementById("whiteShardDisplay").textContent = whiteShards;
            document.getElementById("blackShardDisplay").textContent = blackShards;
            let currentConf = SKINS_CONFIG[equippedSkin] || OP_SKINS[equippedSkin] || SKINS_CONFIG.default;
            document.getElementById("skinDisplay").textContent = currentConf.name;
            document.getElementById("skinDisplay").style.color = currentConf.color;
            
            const fuseBtn = document.getElementById("fuseBtn");
            if (whiteShards >= 1 && blackShards >= 1) {
                fuseBtn.style.display = "block";
                if (checkUnlockStatus("yin_yang")) {
                    fuseBtn.textContent = "ROLL GACHA (1⬛ + 1⬜)"; fuseBtn.style.background = "linear-gradient(90deg, #ff00ff 50%, #00ffff 50%)"; fuseBtn.style.color = "#1a1a2e";
                } else {
                    fuseBtn.textContent = "FUSE SHARDS?"; fuseBtn.style.background = "linear-gradient(90deg, #ffffff 50%, #000000 50%)"; fuseBtn.style.color = "#f9a826";
                }
            } else { fuseBtn.style.display = "none"; }
        }

        // --- SKINS DATABASES ---
        const SKINS_CONFIG = {
            og_stickman: { name: "Exquisite OG", color: "#ff00ff", condition: "First 10 Players", ability: "Looking Dapper" },
            default: { name: "Default", color: "#00adb5" },
            brown: { name: "Brown", color: "#8b4513", score: 100, ability: "+ Hook Range" },
            green: { name: "Green", color: "#00ff00", score: 500, ability: "+ Bounce" },
            pink: { name: "Pink", color: "#ffc0cb", score: 1000, ability: "Low Gravity" },
            blue: { name: "Blue", color: "#0000ff", score: 5000, ability: "Slippery" },
            red: { name: "Red", color: "#ff0000", score: 7000, ability: "Heavy Momentum" },
            orange: { name: "Orange", color: "#ffa500", score: 10000 },
            yellow: { name: "Yellow", color: "#ffff00", score: 20000 },
            gold: { name: "Gold", color: "#d4af37", score: 100000 },
            
            angelic: { name: "Angelic", color: "#ffffff", condition: "Password" },
            denied_angel: { name: "Denied Angel", color: "#ffffff", condition: "???", parent: "angelic" },
            accurate_angel: { name: "Accurate Angel", color: "#ffffff", condition: "???", parent: "angelic" },
            exalted_angel: { name: "Exalted Angel", color: "#ffffff", condition: "???", parent: "angelic" },
            
            devil: { name: "Devil", color: "#ff0055", condition: "???" }, 
            denied_devil: { name: "Denied Devil", color: "#ff0055", condition: "???", parent: "devil" },
            accurate_devil: { name: "Accurate Devil", color: "#d4af37", condition: "???", parent: "devil" },
            exalted_devil: { name: "Exalted Devil", color: "#ff0055", condition: "???", parent: "devil" },

            yin_yang: { name: "Yin Yang", color: "#ffffff", splitColor: "#000000", condition: "FUSED" },
            split_fire_ice: { name: "Fire & Ice", color: "#ff4500", splitColor: "#00ced1", condition: "Gacha Roll" },
            split_toxic_bio: { name: "Toxic Bio", color: "#32cd32", splitColor: "#8a2be2", condition: "Gacha Roll" },
            split_solar_lunar: { name: "Solar Lunar", color: "#ffd700", splitColor: "#191970", condition: "Gacha Roll" },
            split_neon_synth: { name: "Neon Synth", color: "#ff00ff", splitColor: "#00ffff", condition: "Gacha Roll" }
        };

        const OP_SKINS = {
            luffy: { name: "Straw Hat", color: "#ff3838", cost: { white: 5, black: 0 }, ability: "Rubber Reach" }, 
            zoro: { name: "Pirate Hunter", color: "#0be881", cost: { white: 8, black: 1 }, ability: "Heavy Slash" }, 
            sanji: { name: "Black Leg", color: "#0fbcf9", cost: { white: 10, black: 2 }, ability: "Sky Walk" }, 
            nami: { name: "Cat Burglar", color: "#ffa801", cost: { white: 12, black: 3 }, ability: "Shard Magnet" }, 
            law: { name: "Surgeon of Death", color: "#ffffff", splitColor: "#1e272e", cost: { white: 15, black: 5 }, ability: "Room" } 
        };

        // --- RENDER MENUS ---
        function checkUnlockStatus(key) {
            if (key === "default") return true;
            if (unlockedSkinsArray.includes(key)) return true; 
            if (SKINS_CONFIG[key] && SKINS_CONFIG[key].score !== undefined) return highScore >= SKINS_CONFIG[key].score;
            return false;
        }

        function renderChangingRoom() {
            const skinsGrid = document.getElementById("skinsGrid");
            skinsGrid.innerHTML = "";

            const hasAngelSubSkins = checkUnlockStatus("denied_angel") || checkUnlockStatus("accurate_angel") || checkUnlockStatus("exalted_angel");
            const hasDevilSubSkins = checkUnlockStatus("denied_devil") || checkUnlockStatus("accurate_devil") || checkUnlockStatus("exalted_devil");

            Object.keys(SKINS_CONFIG).forEach(key => {
                const skin = SKINS_CONFIG[key];
                if (skin.parent === "angelic" && !angelicDropdownOpen) return;
                if (skin.parent === "devil" && !devilDropdownOpen) return;

                const isUnlocked = checkUnlockStatus(key); const isEquipped = equippedSkin === key;
                const btn = document.createElement("button");
                btn.className = `skin-btn ${isUnlocked ? 'unlocked' : ''} ${isEquipped ? 'equipped' : ''}`;
                if (skin.parent) btn.classList.add("sub-skin");
                
                const preview = document.createElement("span"); preview.className = "skin-preview";
                if (skin.splitColor) preview.style.background = `linear-gradient(90deg, ${skin.color} 50%, ${skin.splitColor} 50%)`;
                else preview.style.backgroundColor = skin.color;
                btn.appendChild(preview);
                
                const nameLabel = document.createElement("span"); nameLabel.textContent = skin.name; btn.appendChild(nameLabel);
                
                const infoLabel = document.createElement("span"); infoLabel.style.fontSize = "9px"; infoLabel.style.color = "#666";
                if (skin.score !== undefined) infoLabel.textContent = `Score: ${skin.score}`;
                else if (skin.condition) infoLabel.textContent = skin.condition;
                btn.appendChild(infoLabel);

                if (skin.ability) {
                    const abLabel = document.createElement("span"); abLabel.className = "ability-text";
                    abLabel.textContent = skin.ability; btn.appendChild(abLabel);
                }

                if (key === "angelic" && isUnlocked && hasAngelSubSkins) {
                    const arrow = document.createElement("div"); arrow.className = "dropdown-arrow"; arrow.textContent = angelicDropdownOpen ? "▲" : "▼";
                    arrow.addEventListener("click", (e) => { e.stopPropagation(); angelicDropdownOpen = !angelicDropdownOpen; renderChangingRoom(); }); btn.appendChild(arrow);
                }
                if (key === "devil" && isUnlocked && hasDevilSubSkins) {
                    const arrow = document.createElement("div"); arrow.className = "dropdown-arrow"; arrow.textContent = devilDropdownOpen ? "▲" : "▼";
                    arrow.addEventListener("click", (e) => { e.stopPropagation(); devilDropdownOpen = !devilDropdownOpen; renderChangingRoom(); }); btn.appendChild(arrow);
                }

                if (isUnlocked) {
                    btn.style.cursor = "pointer";
                    btn.onclick = () => { equippedSkin = key; applySkinAbilities(); saveLocalData(); renderChangingRoom(); renderBazaar(); };
                } else {
                    if (key === "angelic") {
                        btn.style.cursor = "pointer";
                        btn.onclick = () => {
                            let code = prompt("ENTER ACCESS CODE:");
                            if (code && code.toUpperCase() === "ANGEL") {
                                if (!unlockedSkinsArray.includes("angelic")) unlockedSkinsArray.push("angelic");
                                
                                // Auto-unlock denied devil if criteria met
                                let safeEquipped = equippedSkin || "";
                                if (safeEquipped.includes("devil") && !unlockedSkinsArray.includes("denied_devil")) {
                                    unlockedSkinsArray.push("denied_devil"); showToast("😈 UNLOCKED: DENIED DEVIL", 4000, "#ff0055");
                                } else {
                                    showToast("😇 ANGELIC UNLOCKED 😇", 4000, "#ffeaa7");
                                }
                                saveLocalData(); renderChangingRoom();
                            } else if (code) {
                                showToast("❌ INCORRECT PASSWORD", 3000, "#ff0055");
                            }
                        };
                    } else {
                        btn.style.cursor = "not-allowed"; 
                        btn.onclick = null; 
                    }
                }
                skinsGrid.appendChild(btn);
            });
            updateUI();
        }

        function renderBazaar() {
            const bazaarGrid = document.getElementById("bazaarGrid");
            bazaarGrid.innerHTML = "";
            
            Object.keys(OP_SKINS).forEach(key => {
                const skin = OP_SKINS[key];
                const isUnlocked = unlockedSkinsArray.includes(key);
                const isEquipped = equippedSkin === key;

                const card = document.createElement("div");
                card.className = `pirate-card ${isUnlocked ? 'unlocked' : ''} ${isEquipped ? 'equipped' : ''}`;
                
                const preview = document.createElement("div"); preview.className = "skin-preview";
                if (skin.splitColor) preview.style.background = `linear-gradient(90deg, ${skin.color} 50%, ${skin.splitColor} 50%)`;
                else preview.style.backgroundColor = skin.color;
                
                card.innerHTML = `
                    <div class="pirate-name">${skin.name}</div>
                    <div class="pirate-ability">${skin.ability}</div>

                } else if (isUnlocked) {
                    const btn = document.createElement("button"); btn.className = "equip-btn"; btn.textContent = "EQUIP";
                    btn.onclick = () => { equippedSkin = key; applySkinAbilities(); saveLocalData(); renderChangingRoom(); renderBazaar(); };
                    card.appendChild(btn);
                } else {
                    const btn = document.createElement("button"); btn.className = "buy-btn";
                    btn.innerHTML = `<div class="shard-icon icon-white" style="width:8px;height:8px;"></div>${skin.cost.white} <div class="shard-icon icon-black" style="width:8px;height:8px;"></div>${skin.cost.black}`;
                    
                    if (whiteShards < skin.cost.white || blackShards < skin.cost.black) { btn.disabled = true; } 
                    else {
                        btn.onclick = () => {
                            whiteShards -= skin.cost.white; blackShards -= skin.cost.black;
                            unlockedSkinsArray.push(key); equippedSkin = key;
                            applySkinAbilities(); saveLocalData(); renderChangingRoom(); renderBazaar();
                        };
                    }
                    card.appendChild(btn);
                }
                bazaarGrid.appendChild(card);
            });
        }

        // --- Gacha / Fusion Trigger ---
        const fuseBtn = document.getElementById("fuseBtn");
        fuseBtn.addEventListener("click", () => {
            gameStatus = "fusion"; fusionAngle = 0; fusionSpeed = 0.05; fusionDistance = 150; fusionFlash = 0; fuseBtn.style.display = "none";
        });

        // --- ADVANCED PHYSICS ENGINE ---
        const BASE_GRAVITY = 0.45; 
        const BASE_FRICTION = 0.995; 
        const BASE_HOOK_RANGE = 350; 

        let currentGravity = BASE_GRAVITY;
        let currentFriction = BASE_FRICTION;
        let maxHookRange = BASE_HOOK_RANGE;
        let bounceMultiplier = 1;
        let magnetRadius = 0;
        let momentumBoost = 0.05;

        function applySkinAbilities() {
            currentGravity = BASE_GRAVITY; currentFriction = BASE_FRICTION;
            maxHookRange = BASE_HOOK_RANGE; bounceMultiplier = 1;
            magnetRadius = 0; momentumBoost = 0.05;

            let safeEquipped = equippedSkin || "";
            if (safeEquipped === "pink") currentGravity = 0.32;
            if (safeEquipped === "red") momentumBoost = 0.12; 
            if (safeEquipped === "blue") currentFriction = 0.9995; 
            if (safeEquipped === "brown") maxHookRange += 60;
            if (safeEquipped === "green") bounceMultiplier = 1.3;

            if (safeEquipped === "luffy") maxHookRange += 75;
            if (safeEquipped === "zoro") momentumBoost = 0.14; 
            if (safeEquipped === "sanji") bounceMultiplier = 1.6;
            if (safeEquipped === "nami") magnetRadius = 150;
            if (safeEquipped === "law") { currentGravity = 0.3; maxHookRange += 50; magnetRadius = 80; }
        }

        let player = { x: 100, y: 200, vx: 8, vy: 0, radius: 12, isSwinging: false, hookedTo: null, ropeLength: 0 };
        let hooks = []; let bouncers = []; let shards = [];
        let targetHook = null; let cameraX = 0; let score = 0; 

        function spawnEnvironment() {
            if (hooks.length === 0) hooks.push({ x: player.x + 200, y: 150 });
            let lastHook = hooks[hooks.length - 1];
            
            while (lastHook.x < player.x + 1200) {
                let nextX = lastHook.x + Math.floor(Math.random() * 120) + 180; 
                let nextY = Math.floor(Math.random() * 180) + 50; 
                hooks.push({ x: nextX, y: nextY });

                if (Math.random() < 0.3) bouncers.push({ type: "horizontal", x: nextX - 50, y: 400, width: 80, height: 12 });
                
                // SHARD SPAWNING - ONLY IN SPECIFIC REALMS
                if (currentRealm !== 'main' && Math.random() < 0.5) {
                    let shardY = nextY + (Math.random() * 150 - 20);
                    let type = currentRealm === 'sky' ? 'white' : 'black';
                    shards.push({ x: nextX + 60, y: shardY, type: type, collected: false });
                }
                lastHook = hooks[hooks.length - 1];
            }

            hooks = hooks.filter(h => h.x > cameraX - 100); 
            bouncers = bouncers.filter(b => b.x > cameraX - 100); 
            shards = shards.filter(s => s.x > cameraX - 100 && !s.collected);
        }

        function findTarget() {
            let closest = null; let minDist = Infinity;
            hooks.forEach(h => {
                let dx = h.x - player.x; let dy = h.y - player.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < minDist && h.x > player.x - 20 && dist < maxHookRange) { minDist = dist; closest = h; }
            });
            targetHook = closest;
        }

        function resetGame() {
            player.x = 100; player.y = 200; player.vx = 8; player.vy = 0; player.isSwinging = false; player.hookedTo = null;
            hooks = []; bouncers = []; shards = []; score = 0; 
            document.getElementById("scoreDisplay").textContent = 0; 
            spawnEnvironment(); gameStatus = "playing";
        }

        // Controls
        function startSwing() {
            if (gameStatus === "lost") { resetGame(); return; }
            if (gameStatus === "fusion") return; 
            if (targetHook && !player.isSwinging) {
                let dx = targetHook.x - player.x; let dy = targetHook.y - player.y;
                player.isSwinging = true; player.hookedTo = targetHook; player.ropeLength = Math.sqrt(dx * dx + dy * dy);
            }
        }
        function endSwing() { player.isSwinging = false; player.hookedTo = null; }

        canvas.addEventListener("mousedown", startSwing); window.addEventListener("mouseup", endSwing);
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); startSwing(); }, { passive: false });
        window.addEventListener("touchend", (e) => { e.preventDefault(); endSwing(); }, { passive: false });
        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); startSwing(); } });
        window.addEventListener("keyup", (e) => { if (e.code === "Space") endSwing(); });

        function update() {
            if (gameStatus === "fusion" || gameStatus === "lost") return;
            
            player.vy += currentGravity; player.vx *= currentFriction; player.vy *= currentFriction; 
            player.x += player.vx; player.y += player.vy;

            spawnEnvironment();
            if (!player.isSwinging) findTarget();
            flameOffset += 0.05; 

            // Tangent Velocity Projection (Advanced Physics)
            if (player.isSwinging && player.hookedTo) {
                let h = player.hookedTo; let dx = player.x - h.x; let dy = player.y - h.y; let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > player.ropeLength) {
                    player.x = h.x + (dx / dist) * player.ropeLength; player.y = h.y + (dy / dist) * player.ropeLength;
                    let nx = dx / dist; let ny = dy / dist; let vDotN = player.vx * nx + player.vy * ny;
                    if (vDotN > 0) { player.vx -= vDotN * nx; player.vy -= vDotN * ny; }
                    let tangentX = -ny; let tangentY = nx; let speedTangent = player.vx * tangentX + player.vy * tangentY;
                    player.vx += tangentX * momentumBoost * Math.sign(speedTangent);
                }
            }

            bouncers.forEach(pad => {
                let px = Math.max(pad.x, Math.min(player.x, pad.x + pad.width));
                let py = Math.max(pad.y, Math.min(player.y, pad.y + pad.height));
                let dx = player.x - px; let dy = player.y - py;
                if ((dx * dx + dy * dy) < (player.radius * player.radius)) {
                    player.y = pad.y - player.radius; player.vy = -Math.max(Math.abs(player.vy) * 1.2, 12) * bounceMultiplier; player.vx *= 1.1;
                    player.isSwinging = false; player.hookedTo = null;
                }
            });

            shards.forEach(s => {
                if (s.collected) return;
                let dx = player.x - s.x; let dy = player.y - s.y; let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (magnetRadius > 0 && dist < magnetRadius && dist > player.radius) {
                    s.x += dx * 0.15; s.y += dy * 0.15; 
                }
                if (dist < player.radius + 10) {
                    s.collected = true; if (s.type === 'white') whiteShards++; else blackShards++;
                    updateUI(); renderBazaar(); saveLocalData();
                }
            });

            cameraX = player.x - 250;
            score = Math.floor(player.x / 10) - 10; document.getElementById("scoreDisplay").textContent = score;

            // Hint Logic & Unlocks
            if (score >= 5000 && !localStorage.getItem(getSaveKey("hint_5000"))) {
                showToast("🔒 A secret skin requires a password...", 5000, "#f9a826");
                localStorage.setItem(getSaveKey("hint_5000"), "true");
            }
            if (score >= 10000 && !localStorage.getItem(getSaveKey("hint_10000"))) {
                showToast("🗝️ The secret password is: ANGEL", 6000, "#f9a826");
                localStorage.setItem(getSaveKey("hint_10000"), "true");
            }
            
            let safeEquipped = equippedSkin || "";
            if (score >= 10000) {
                if (safeEquipped.includes("angel") && !unlockedSkinsArray.includes("exalted_angel")) { 
                    unlockedSkinsArray.push("exalted_angel"); saveLocalData(); showToast("✨ UNLOCKED: EXALTED ANGEL!", 5000, "#ffeaa7"); renderChangingRoom(); 
                }
                if (safeEquipped.includes("devil") && !unlockedSkinsArray.includes("exalted_devil")) { 
                    unlockedSkinsArray.push("exalted_devil"); saveLocalData(); showToast("🔥 UNLOCKED: EXALTED DEVIL!", 5000, "#ff0055"); renderChangingRoom(); 
                }
            }

            if (player.y > canvas.height + 200) {
                gameStatus = "lost"; let needsSave = false;
                if (score > highScore) { highScore = score; document.getElementById("highScoreDisplay").textContent = highScore; needsSave = true; }
                
                if (score < 0 && !unlockedSkinsArray.includes("devil")) { unlockedSkinsArray.push("devil"); showToast("👹 UNLOCKED: THE DEVIL SKIN!", 5000, "#ff0055"); needsSave = true; }
                if (score < 0 && safeEquipped.includes("angel") && !unlockedSkinsArray.includes("denied_angel")) { unlockedSkinsArray.push("denied_angel"); showToast("🥀 UNLOCKED: DENIED ANGEL", 5000, "#ff0055"); needsSave = true; }
                
                if (safeEquipped.includes("angel")) {
                    let angelDeaths = parseInt(localStorage.getItem(getSaveKey("angelic_deaths")) || "0") + 1; localStorage.setItem(getSaveKey("angelic_deaths"), angelDeaths);
                    if (angelDeaths >= 20 && !unlockedSkinsArray.includes("accurate_angel")) { unlockedSkinsArray.push("accurate_angel"); showToast("👁️ UNLOCKED: ACCURATE ANGEL", 5000, "#ffeaa7"); needsSave = true; }
                }
                if (safeEquipped.includes("devil")) {
                    let devilDeaths = parseInt(localStorage.getItem(getSaveKey("devil_deaths")) || "0") + 1; localStorage.setItem(getSaveKey("devil_deaths"), devilDeaths);
                    if (devilDeaths >= 20 && !unlockedSkinsArray.includes("accurate_devil")) { unlockedSkinsArray.push("accurate_devil"); showToast("🎩 UNLOCKED: ACCURATE DEVIL", 5000, "#d4af37"); needsSave = true; }
                }

                if (needsSave) saveLocalData();
            }
        }

        function drawFusionCutscene() {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let cx = canvas.width / 2; let cy = canvas.height / 2;
            fusionAngle += fusionSpeed; fusionSpeed += 0.002; fusionDistance -= 0.6; 

            if (fusionDistance <= 0) {
                fusionFlash += 5; 
                if (fusionFlash > 255) {
                    whiteShards--; blackShards--;
                    let unlockedSkinKey = "yin_yang";
                    let alertMsg = "☯️ PERFECT BALANCE ACHIEVED: YIN YANG UNLOCKED ☯️";

                    if (checkUnlockStatus("yin_yang")) {
                        const gachaPool = ["split_fire_ice", "split_toxic_bio", "split_solar_lunar", "split_neon_synth"];
                        const available = gachaPool.filter(s => !checkUnlockStatus(s));
                        
                        if (available.length > 0) {
                            unlockedSkinKey = available[Math.floor(Math.random() * available.length)];
                            alertMsg = `🎉 GACHA ROLL SUCCESS! 🎉\nCost: 1⬛ + 1⬜\nUnlocked: ${SKINS_CONFIG[unlockedSkinKey].name.toUpperCase()}`;
                        } else {
                            highScore += 5000; 
                            alertMsg = "💎 GACHA MAXED OUT! 💎\nCost: 1⬛ + 1⬜\nYou received 5000 Bonus Points instead!";
                            unlockedSkinKey = equippedSkin; 
                        }
                    }
                    
                    if (unlockedSkinKey !== equippedSkin) {
                        equippedSkin = unlockedSkinKey; 
                        if (!unlockedSkinsArray.includes(unlockedSkinKey)) unlockedSkinsArray.push(unlockedSkinKey);
                    }
                    
                    saveLocalData();
                    showToast(alertMsg, 5000, "#00ffff"); 
                    renderChangingRoom(); renderBazaar();
                    resetGame(); 
                    return;
                }
            } else {
                let bx = cx + Math.cos(fusionAngle) * fusionDistance; 
                let by = cy + Math.sin(fusionAngle) * fusionDistance;
                ctx.fillStyle = "#000"; ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; 
                ctx.beginPath(); ctx.arc(bx, by, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                
                let wx = cx + Math.cos(fusionAngle + Math.PI) * fusionDistance; 
                let wy = cy + Math.sin(fusionAngle + Math.PI) * fusionDistance;
                ctx.fillStyle = "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 2; 
                ctx.beginPath(); ctx.arc(wx, wy, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
            
            if (fusionFlash > 0) { 
                ctx.fillStyle = `rgba(255, 255, 255, ${fusionFlash / 255})`; 
                ctx.fillRect(0, 0, canvas.width, canvas.height); 
            }
        }

        function drawHalo(x, y, color) { ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(x, y - 20, 14, 4, 0, 0, Math.PI * 2); ctx.stroke(); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameStatus === "fusion") { drawFusionCutscene(); return; }

            ctx.save(); ctx.translate(-cameraX, 0); 
            
            if (currentRealm === 'main') ctx.strokeStyle = "rgba(44, 62, 80, 0.5)";
            else if (currentRealm === 'sky') ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            else ctx.strokeStyle = "rgba(255, 0, 0, 0.2)";
            
            ctx.lineWidth = 1;
            let startGridX = Math.floor(cameraX / 100) * 100;
            for (let i = startGridX; i < startGridX + canvas.width + 200; i += 100) { 
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); 
            }
            
            bouncers.forEach(pad => {
                ctx.fillStyle = "#ff4757"; ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
                ctx.fillStyle = "#ffa502"; ctx.fillRect(pad.x + 4, pad.y + 2, pad.width - 8, 4);
            });

            hooks.forEach(h => {
                let isTarget = (h === targetHook && !player.isSwinging);
                let idleColor = currentRealm === 'sky' ? "#fff" : (currentRealm === 'underworld' ? "#444" : "#747d8c");
                let targetColor = currentRealm === 'sky' ? "#00bcd4" : (currentRealm === 'underworld' ? "#ff5252" : "#4ecca3");
                
                ctx.fillStyle = isTarget ? targetColor : idleColor;
                ctx.beginPath(); ctx.arc(h.x, h.y, 6, 0, Math.PI * 2); ctx.fill();
                
                ctx.strokeStyle = isTarget ? targetColor : idleColor; 
                ctx.globalAlpha = 0.4;
                ctx.lineWidth = isTarget ? 3 : 1;
                ctx.beginPath(); ctx.arc(h.x, h.y, 14, 0, Math.PI * 2); ctx.stroke();
                ctx.globalAlpha = 1.0;
                
                if (isTarget && !player.isSwinging) {
                    ctx.strokeStyle = targetColor; ctx.globalAlpha = 0.2;
                    ctx.beginPath(); ctx.arc(player.x, player.y, maxHookRange, 0, Math.PI*2); ctx.stroke();
                    ctx.globalAlpha = 1.0;
                }
            });

            if (player.isSwinging && player.hookedTo) {
                let ropeColor = currentRealm === 'sky' ? "rgba(0, 0, 0, 0.5)" : "rgba(255, 255, 255, 0.8)";
                ctx.strokeStyle = ropeColor; ctx.lineWidth = 2.5; 
                ctx.beginPath(); ctx.moveTo(player.hookedTo.x, player.hookedTo.y); ctx.lineTo(player.x, player.y); ctx.stroke();
            }

            shards.forEach(s => {
                if (s.collected) return;
                ctx.fillStyle = s.type === 'white' ? "#ffffff" : "#000000";
                ctx.strokeStyle = s.type === 'white' ? "#cccccc" : "#ff3838";
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(s.x, s.y - 6); ctx.lineTo(s.x + 6, s.y); ctx.lineTo(s.x, s.y + 6); ctx.lineTo(s.x - 6, s.y); ctx.closePath();
                ctx.fill(); ctx.stroke();
            });

            let safeEquipped = equippedSkin || "default";
            let skinInfo = SKINS_CONFIG[safeEquipped] || OP_SKINS[safeEquipped] || SKINS_CONFIG.default;
            
            if (safeEquipped === "og_stickman") { ctx.shadowColor = "#ff00ff"; ctx.shadowBlur = 15; }
            
            // CUSTOM GACHA SHAPES
            if (skinInfo.splitColor) {
                let colorLeft = skinInfo.color || "#ffffff";
                let colorRight = skinInfo.splitColor || "#000000";

                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(flameOffset * 2); 

                if (safeEquipped === "yin_yang") {
                    ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.arc(0, 0, player.radius, Math.PI / 2, Math.PI * 1.5); ctx.fill();
                    ctx.fillStyle = colorRight; ctx.beginPath(); ctx.arc(0, 0, player.radius, Math.PI * 1.5, Math.PI / 2); ctx.fill();
                    ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.arc(0, -player.radius / 2, player.radius / 2, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = colorRight; ctx.beginPath(); ctx.arc(0, player.radius / 2, player.radius / 2, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = colorRight; ctx.beginPath(); ctx.arc(0, -player.radius / 2, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.arc(0, player.radius / 2, 2.5, 0, Math.PI * 2); ctx.fill();
                    
                } else if (safeEquipped === "split_fire_ice") {
                    ctx.fillStyle = colorRight; ctx.beginPath(); ctx.arc(0, 0, player.radius, Math.PI / 2, Math.PI * 1.5); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0, -player.radius); ctx.lineTo(-player.radius-5, -5); ctx.lineTo(0, 0); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-player.radius-8, 6); ctx.lineTo(0, player.radius); ctx.fill();
                    
                    ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.arc(0, 0, player.radius, -Math.PI / 2, Math.PI / 2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0, -player.radius); ctx.quadraticCurveTo(player.radius+8, -8, 0, 0); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(player.radius+10, 8, 0, player.radius); ctx.fill();
                    
                } else if (safeEquipped === "split_toxic_bio") {
                    ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = colorRight; ctx.beginPath(); ctx.arc(-4, -4, 4, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5, -2, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(0, 6, 5, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = colorRight; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, player.radius + 3, 0, Math.PI*2); ctx.stroke();
                    
                } else if (safeEquipped === "split_solar_lunar") {
                    ctx.fillStyle = colorRight; ctx.beginPath(); ctx.arc(0, 0, player.radius, Math.PI/2, Math.PI*1.5); ctx.fill();
                    ctx.fillStyle = "#1a1a2e"; ctx.beginPath(); ctx.arc(3, 0, player.radius-2, Math.PI/2, Math.PI*1.5); ctx.fill();
                    
                    ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.arc(0, 0, player.radius-2, -Math.PI/2, Math.PI/2); ctx.fill();
                    for(let i=-Math.PI/2; i<=Math.PI/2; i+=Math.PI/4) {
                        ctx.beginPath(); ctx.moveTo(0, 0); 
                        ctx.lineTo(Math.cos(i-0.2)*player.radius, Math.sin(i-0.2)*player.radius);
                        ctx.lineTo(Math.cos(i)*(player.radius+6), Math.sin(i)*(player.radius+6));
                        ctx.lineTo(Math.cos(i+0.2)*player.radius, Math.sin(i+0.2)*player.radius); ctx.fill();
                    }
                    
                } else if (safeEquipped === "split_neon_synth") {
                    ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.moveTo(0, -player.radius-2); ctx.lineTo(-player.radius-2, 0); ctx.lineTo(0, player.radius+2); ctx.fill();
                    ctx.fillStyle = colorRight; ctx.beginPath(); ctx.moveTo(0, -player.radius-2); ctx.lineTo(player.radius+2, 0); ctx.lineTo(0, player.radius+2); ctx.fill();
                    ctx.strokeStyle = "#1a1a2e"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(-player.radius, -player.radius/2); ctx.lineTo(player.radius, -player.radius/2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-player.radius, player.radius/2); ctx.lineTo(player.radius, player.radius/2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, -player.radius-2); ctx.lineTo(0, player.radius+2); ctx.stroke();
                } else {
                    ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.arc(0, 0, player.radius, Math.PI / 2, Math.PI * 1.5); ctx.fill();
                    ctx.fillStyle = colorRight; ctx.beginPath(); ctx.arc(0, 0, player.radius, Math.PI * 1.5, Math.PI / 2); ctx.fill();
                }
                ctx.restore();
            } else {
                ctx.fillStyle = skinInfo.color;
                ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;

                if (safeEquipped === "og_stickman") {
                    ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(player.x + 5, player.y - 3, 4, 0, Math.PI*2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(player.x + 9, player.y - 3); ctx.lineTo(player.x + 14, player.y + 4); ctx.stroke();
                    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(player.x, player.y + 6); ctx.lineTo(player.x - 6, player.y + 3); ctx.lineTo(player.x - 6, player.y + 9); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(player.x, player.y + 6); ctx.lineTo(player.x + 6, player.y + 3); ctx.lineTo(player.x + 6, player.y + 9); ctx.fill();
                    ctx.fillStyle = "#111"; ctx.fillRect(player.x - 10, player.y - 12, 20, 2); ctx.fillRect(player.x - 6, player.y - 24, 12, 12);
                    ctx.fillStyle = "#FFD700"; ctx.fillRect(player.x - 6, player.y - 15, 12, 3);
                }

                if (safeEquipped === "angelic" || safeEquipped === "accurate_angel" || safeEquipped === "exalted_angel" || safeEquipped === "denied_devil") drawHalo(player.x, player.y, "#ffeaa7");
                if (safeEquipped === "denied_angel") drawHalo(player.x, player.y, "#ff0055");
                
                if (safeEquipped === "devil" || safeEquipped === "exalted_devil") {
                    ctx.fillStyle = "#ff0055"; ctx.beginPath(); ctx.moveTo(player.x - 8, player.y - 8); ctx.lineTo(player.x - 14, player.y - 18); ctx.lineTo(player.x - 2, player.y - 11); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(player.x + 8, player.y - 8); ctx.lineTo(player.x + 14, player.y - 18); ctx.lineTo(player.x + 2, player.y - 11); ctx.fill();
                }
                if (safeEquipped === "denied_devil") {
                    ctx.fillStyle = "#cc0044"; ctx.beginPath(); ctx.ellipse(player.x - 10, player.y + 2, 3, 9, Math.PI/4, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(player.x + 10, player.y + 2, 3, 9, -Math.PI/4, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(player.x - 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(player.x + 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
                }
                if (safeEquipped === "accurate_devil") {
                    ctx.fillStyle = "#111111"; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI); ctx.fill();
                    ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.moveTo(player.x - 5, player.y - 3); ctx.lineTo(player.x + 5, player.y - 3); ctx.lineTo(player.x, player.y + 4); ctx.fill();
                    ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.moveTo(player.x - 4, player.y - 2); ctx.lineTo(player.x, player.y); ctx.lineTo(player.x - 4, player.y + 2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(player.x + 4, player.y - 2); ctx.lineTo(player.x, player.y); ctx.lineTo(player.x + 4, player.y + 2); ctx.fill();
                    ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(player.x - 4, player.y - 5, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(player.x + 4, player.y - 5, 2, 0, Math.PI*2); ctx.fill();
                }
                if (safeEquipped === "exalted_devil") {
                    ctx.strokeStyle = "#8b0000"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(player.x + 8, player.y + 6); ctx.lineTo(player.x + 22, player.y - 12); ctx.stroke(); 
                    ctx.beginPath(); ctx.moveTo(player.x + 16, player.y - 9); ctx.lineTo(player.x + 19, player.y - 16); ctx.lineTo(player.x + 26, player.y - 12); ctx.stroke(); 
                    ctx.fillStyle = "#8b0000"; ctx.beginPath(); ctx.arc(player.x + 23, player.y - 13, 1.2, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = "#000000"; ctx.beginPath(); ctx.arc(player.x - 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(player.x + 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
                }
                if (safeEquipped === "accurate_angel") {
                    ctx.fillStyle = "#000000"; let eyePos = [[-5, -4], [0, -6], [5, -4], [-4, 3], [4, 3], [0, 6]];
                    eyePos.forEach(p => { ctx.beginPath(); ctx.arc(player.x + p[0], player.y + p[1], 1.8, 0, Math.PI*2); ctx.fill(); });
                }
            }
            
            if (safeEquipped === "law" && player.isSwinging) {
                ctx.strokeStyle = "rgba(0, 206, 209, 0.4)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(player.x, player.y, 80, 0, Math.PI*2); ctx.stroke();
            }

            ctx.restore();

            if (gameStatus === "lost") {
                ctx.fillStyle = "rgba(15, 15, 26, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#e94560"; ctx.font = "bold 42px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("WIPED OUT", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px sans-serif"; ctx.fillStyle = "#fff";
                ctx.fillText(`Distance: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = "#888"; ctx.font = "16px sans-serif";
                ctx.fillText("Press Space or Click to try again", canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        updateAuthUI(); 
        // Initial setup
        applySkinAbilities(); spawnEnvironment();
        
        function loop() { update(); draw(); requestAnimationFrame(loop); } 
        loop();
    </script>
</body>
</html>
