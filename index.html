<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏴‍☠️</text></svg>">
    <title>Grand Line Hook - Advanced Physics</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        
        #main-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        
        canvas {
            background: #1a2a40;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            max-width: 800px;
            border: 2px solid #2c3e50;
        }
        
        #ui {
            display: flex;
            gap: 15px;
            font-size: 15px;
            font-weight: bold;
            background: #1e272e;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #2c3e50;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
        }
        .score-val { color: #0be881; }
        .high-val { color: #ffa801; }
        
        #shardDisplay { display: flex; gap: 15px; align-items: center; }
        .shard-counter { display: flex; align-items: center; gap: 5px; }
        .shard-icon { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #777; }
        .icon-white { background: #fff; box-shadow: 0 0 5px #fff; }
        .icon-black { background: #000; border-color: #fff; box-shadow: 0 0 5px #ff3838; }

        #shop-panel {
            background: #1e272e;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        
        #shop-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #0fbcf9;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 5px;
        }
        
        .skins-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skin-card {
            background: #2d3436;
            border: 2px solid #636e72;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 140px;
            transition: all 0.2s;
        }
        .skin-card.unlocked { border-color: #0be881; }
        .skin-card.equipped { border-color: #ffa801; background: #353b48; box-shadow: 0 0 10px rgba(255, 168, 1, 0.3); }
        
        .skin-preview { 
            width: 20px; height: 20px; border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.5); 
        }
        
        .skin-name { font-size: 13px; font-weight: bold; text-align: center; color: #fff;}
        .skin-ability { font-size: 10px; color: #0fbcf9; text-align: center; height: 24px;}
        
        .buy-btn {
            background: #4bcffa; color: #1e272e; border: none; padding: 5px 10px;
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px;
            width: 100%; display: flex; justify-content: center; gap: 5px; align-items: center;
        }
        .buy-btn:hover { background: #0fbcf9; }
        .buy-btn:disabled { background: #636e72; color: #b2bec3; cursor: not-allowed; }
        .equip-btn {
            background: #0be881; color: #1e272e; border: none; padding: 5px 10px;
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; width: 100%;
        }
        .equipped-text { font-size: 11px; color: #ffa801; font-weight: bold; padding: 5px 0; }

    </style>
</head>
<body>

    <div id="main-layout">
        <div id="game-container">
            <div id="ui">
                <div>Score: <span id="scoreDisplay" class="score-val">0</span></div>
                <div>High Score: <span id="highScoreDisplay" class="high-val">0</span></div>
                <div id="shardDisplay">
                    <div class="shard-counter">
                        <div class="shard-icon icon-white"></div>
                        <span id="whiteShardDisplay">0</span>
                    </div>
                    <div class="shard-counter">
                        <div class="shard-icon icon-black"></div>
                        <span id="blackShardDisplay">0</span>
                    </div>
                </div>
            </div>

            <canvas id="gameCanvas" width="800" height="420"></canvas>

            <div id="shop-panel">
                <h3>🏴‍☠️ Pirate Bazaar</h3>
                <div class="skins-grid" id="skinsGrid"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // --- Persistence & Economy ---
        let highScore = parseInt(localStorage.getItem("op_high_score")) || 0;
        let whiteShards = parseInt(localStorage.getItem("op_white_shards")) || 0;
        let blackShards = parseInt(localStorage.getItem("op_black_shards")) || 0;
        let equippedSkin = localStorage.getItem("op_equipped_skin") || "default";
        let unlockedSkins = JSON.parse(localStorage.getItem("op_unlocked_skins")) || ["default"];

        document.getElementById("highScoreDisplay").textContent = highScore;
        
        function saveLocalData() {
            localStorage.setItem("op_high_score", highScore);
            localStorage.setItem("op_white_shards", whiteShards);
            localStorage.setItem("op_black_shards", blackShards);
            localStorage.setItem("op_equipped_skin", equippedSkin);
            localStorage.setItem("op_unlocked_skins", JSON.stringify(unlockedSkins));
            updateUI();
        }

        function updateUI() {
            document.getElementById("whiteShardDisplay").textContent = whiteShards;
            document.getElementById("blackShardDisplay").textContent = blackShards;
        }
        updateUI();

        // --- Skins & Abilities ---
        const SKINS_CONFIG = {
            default: { name: "Rookie Pirate", color: "#cccccc", cost: { white: 0, black: 0 }, ability: "None" },
            luffy: { name: "Straw Hat", color: "#ff3838", cost: { white: 50, black: 2 }, ability: "Rubber Reach" },
            zoro: { name: "Pirate Hunter", color: "#0be881", cost: { white: 100, black: 5 }, ability: "Heavy Slash" },
            sanji: { name: "Black Leg", color: "#0fbcf9", cost: { white: 150, black: 10 }, ability: "Sky Walk" },
            nami: { name: "Cat Burglar", color: "#ffa801", cost: { white: 200, black: 15 }, ability: "Treasure Magnet" },
            law: { name: "Surgeon of Death", color: "#ffffff", splitColor: "#1e272e", cost: { white: 500, black: 50 }, ability: "Room (Gravity+Reach)" }
        };

        const skinsGrid = document.getElementById("skinsGrid");

        function renderShop() {
            skinsGrid.innerHTML = "";
            Object.keys(SKINS_CONFIG).forEach(key => {
                const skin = SKINS_CONFIG[key];
                const isUnlocked = unlockedSkins.includes(key);
                const isEquipped = equippedSkin === key;

                const card = document.createElement("div");
                card.className = `skin-card ${isUnlocked ? 'unlocked' : ''} ${isEquipped ? 'equipped' : ''}`;
                
                const preview = document.createElement("div");
                preview.className = "skin-preview";
                if (skin.splitColor) {
                    preview.style.background = `linear-gradient(90deg, ${skin.color} 50%, ${skin.splitColor} 50%)`;
                } else {
                    preview.style.backgroundColor = skin.color;
                }
                
                card.innerHTML = `
                    <div class="skin-name">${skin.name}</div>
                    <div class="skin-ability">${skin.ability}</div>
                `;
                card.insertBefore(preview, card.firstChild);

                if (isEquipped) {
                    const status = document.createElement("div");
                    status.className = "equipped-text"; status.textContent = "EQUIPPED";
                    card.appendChild(status);
                } else if (isUnlocked) {
                    const btn = document.createElement("button");
                    btn.className = "equip-btn"; btn.textContent = "EQUIP";
                    btn.onclick = () => { equippedSkin = key; applySkinAbilities(); saveLocalData(); renderShop(); };
                    card.appendChild(btn);
                } else {
                    const btn = document.createElement("button");
                    btn.className = "buy-btn";
                    btn.innerHTML = `<div class="shard-icon icon-white" style="width:8px;height:8px;"></div>${skin.cost.white} &nbsp; <div class="shard-icon icon-black" style="width:8px;height:8px;"></div>${skin.cost.black}`;
                    
                    if (whiteShards < skin.cost.white || blackShards < skin.cost.black) {
                        btn.disabled = true;
                    } else {
                        btn.onclick = () => {
                            whiteShards -= skin.cost.white;
                            blackShards -= skin.cost.black;
                            unlockedSkins.push(key);
                            equippedSkin = key;
                            applySkinAbilities();
                            saveLocalData();
                            renderShop();
                        };
                    }
                    card.appendChild(btn);
                }
                skinsGrid.appendChild(card);
            });
        }

        // --- Physics Engine & Game State ---
        const BASE_GRAVITY = 0.45; 
        const BASE_FRICTION = 0.995; 
        const BASE_HOOK_RANGE = 350; 

        let currentGravity = BASE_GRAVITY;
        let currentFriction = BASE_FRICTION;
        let maxHookRange = BASE_HOOK_RANGE;
        let bounceMultiplier = 1;
        let magnetRadius = 0;
        let momentumBoost = 0.05;

        function applySkinAbilities() {
            currentGravity = BASE_GRAVITY;
            currentFriction = BASE_FRICTION;
            maxHookRange = BASE_HOOK_RANGE;
            bounceMultiplier = 1;
            magnetRadius = 0;
            momentumBoost = 0.05;

            if (equippedSkin === "luffy") maxHookRange += 75;
            if (equippedSkin === "zoro") momentumBoost = 0.12; 
            if (equippedSkin === "sanji") bounceMultiplier = 1.6;
            if (equippedSkin === "nami") magnetRadius = 120;
            if (equippedSkin === "law") { currentGravity = 0.3; maxHookRange += 50; magnetRadius = 60; }
        }

        let player = { x: 100, y: 200, vx: 8, vy: 0, radius: 12, isSwinging: false, hookedTo: null, ropeLength: 0 };
        let hooks = []; let bouncers = []; let shards = [];
        let targetHook = null; let cameraX = 0; let score = 0; 
        let gameStatus = "playing";

        function spawnEnvironment() {
            if (hooks.length === 0) hooks.push({ x: player.x + 200, y: 150 });
            let lastHook = hooks[hooks.length - 1];
            
            while (lastHook.x < player.x + 1200) {
                let nextX = lastHook.x + Math.floor(Math.random() * 120) + 180; 
                let nextY = Math.floor(Math.random() * 180) + 50; 
                hooks.push({ x: nextX, y: nextY });

                // Spawn Pads
                if (Math.random() < 0.3) bouncers.push({ type: "horizontal", x: nextX - 50, y: 400, width: 80, height: 12 });
                
                // Spawn Shards
                if (Math.random() < 0.6) {
                    let shardY = nextY + (Math.random() * 150 - 20);
                    let type = Math.random() < 0.15 ? 'black' : 'white'; // 15% chance for black shard
                    shards.push({ x: nextX + 60, y: shardY, type: type, collected: false });
                }
                lastHook = hooks[hooks.length - 1];
            }

            // Cleanup behind camera
            hooks = hooks.filter(h => h.x > cameraX - 100); 
            bouncers = bouncers.filter(b => b.x > cameraX - 100); 
            shards = shards.filter(s => s.x > cameraX - 100 && !s.collected);
        }

        function findTarget() {
            let closest = null; let minDist = Infinity;
            hooks.forEach(h => {
                let dx = h.x - player.x; let dy = h.y - player.y; let dist = Math.sqrt(dx*dx + dy*dy);
                // Prefer hooks slightly in front and within range
                if (dist < minDist && h.x > player.x - 20 && dist < maxHookRange) {
                    minDist = dist; closest = h;
                }
            });
            targetHook = closest;
        }

        function resetGame() {
            player.x = 100; player.y = 200; player.vx = 8; player.vy = 0; player.isSwinging = false; player.hookedTo = null;
            hooks = []; bouncers = []; shards = []; score = 0; 
            document.getElementById("scoreDisplay").textContent = 0; 
            spawnEnvironment(); 
            gameStatus = "playing";
        }

        // Controls
        function startSwing() {
            if (gameStatus === "lost") { resetGame(); return; }
            if (targetHook && !player.isSwinging) {
                let dx = targetHook.x - player.x; let dy = targetHook.y - player.y;
                player.isSwinging = true; player.hookedTo = targetHook; 
                player.ropeLength = Math.sqrt(dx * dx + dy * dy);
            }
        }
        function endSwing() { player.isSwinging = false; player.hookedTo = null; }

        canvas.addEventListener("mousedown", startSwing); window.addEventListener("mouseup", endSwing);
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); startSwing(); }, { passive: false });
        window.addEventListener("touchend", (e) => { e.preventDefault(); endSwing(); }, { passive: false });
        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); startSwing(); } });
        window.addEventListener("keyup", (e) => { if (e.code === "Space") endSwing(); });

        // Physics Loop
        function update() {
            if (gameStatus === "lost") return;
            
            // Apply Gravity & Friction
            player.vy += currentGravity; 
            player.vx *= currentFriction; 
            player.vy *= currentFriction; 
            
            player.x += player.vx; 
            player.y += player.vy;

            spawnEnvironment();
            if (!player.isSwinging) findTarget();

            // ADVANCED PHYSICS: Tangent Velocity Projection
            if (player.isSwinging && player.hookedTo) {
                let h = player.hookedTo;
                let dx = player.x - h.x;
                let dy = player.y - h.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > player.ropeLength) {
                    // Constrain Position to arc
                    player.x = h.x + (dx / dist) * player.ropeLength;
                    player.y = h.y + (dy / dist) * player.ropeLength;

                    // Get normal vector (pointing away from hook)
                    let nx = dx / dist;
                    let ny = dy / dist;

                    // Calculate velocity component moving away from hook (dot product)
                    let vDotN = player.vx * nx + player.vy * ny;
                    
                    // Kill outward velocity to maintain circular path
                    if (vDotN > 0) {
                        player.vx -= vDotN * nx;
                        player.vy -= vDotN * ny;
                    }
                    
                    // Artificial Swing Momentum Injection
                    let tangentX = -ny; let tangentY = nx;
                    let speedTangent = player.vx * tangentX + player.vy * tangentY;
                    player.vx += tangentX * momentumBoost * Math.sign(speedTangent);
                }
            }

            // Bouncers
            bouncers.forEach(pad => {
                let px = Math.max(pad.x, Math.min(player.x, pad.x + pad.width));
                let py = Math.max(pad.y, Math.min(player.y, pad.y + pad.height));
                let dx = player.x - px; let dy = player.y - py;
                if ((dx * dx + dy * dy) < (player.radius * player.radius)) {
                    player.y = pad.y - player.radius; 
                    player.vy = -Math.max(Math.abs(player.vy) * 1.2, 12) * bounceMultiplier; 
                    player.vx *= 1.1;
                    player.isSwinging = false; player.hookedTo = null;
                }
            });

            // Shards Collection
            shards.forEach(s => {
                if (s.collected) return;
                let dx = player.x - s.x; let dy = player.y - s.y; let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (magnetRadius > 0 && dist < magnetRadius && dist > player.radius) {
                    s.x += dx * 0.15; s.y += dy * 0.15; 
                }
                
                if (dist < player.radius + 10) {
                    s.collected = true;
                    if (s.type === 'white') whiteShards++; else blackShards++;
                    updateUI();
                }
            });

            cameraX = player.x - 250;
            score = Math.floor(player.x / 10) - 10; 
            document.getElementById("scoreDisplay").textContent = score;

            // Death Condition
            if (player.y > canvas.height + 200) {
                gameStatus = "lost"; 
                if (score > highScore) { highScore = score; document.getElementById("highScoreDisplay").textContent = highScore; }
                saveLocalData(); renderShop();
            }
        }

        // Render Loop
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Grid Background
            ctx.save(); ctx.translate(-cameraX, 0); 
            ctx.strokeStyle = "rgba(44, 62, 80, 0.5)"; ctx.lineWidth = 1;
            let startGridX = Math.floor(cameraX / 100) * 100;
            for (let i = startGridX; i < startGridX + canvas.width + 200; i += 100) { 
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); 
            }
            
            // Draw Bouncers
            bouncers.forEach(pad => {
                ctx.fillStyle = "#ff4757"; ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
                ctx.fillStyle = "#ffa502"; ctx.fillRect(pad.x + 4, pad.y + 2, pad.width - 8, 4);
            });

            // Draw Hooks
            hooks.forEach(h => {
                let isTarget = (h === targetHook && !player.isSwinging);
                ctx.fillStyle = isTarget ? "#0be881" : "#747d8c";
                ctx.beginPath(); ctx.arc(h.x, h.y, 6, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = isTarget ? "rgba(11, 232, 129, 0.6)" : "rgba(116, 125, 140, 0.3)"; 
                ctx.lineWidth = isTarget ? 3 : 1;
                ctx.beginPath(); ctx.arc(h.x, h.y, 14, 0, Math.PI * 2); ctx.stroke();
                
                if (isTarget && !player.isSwinging) {
                    ctx.strokeStyle = "rgba(11, 232, 129, 0.1)";
                    ctx.beginPath(); ctx.arc(player.x, player.y, maxHookRange, 0, Math.PI*2); ctx.stroke();
                }
            });

            // Draw Rope
            if (player.isSwinging && player.hookedTo) {
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)"; ctx.lineWidth = 2.5; 
                ctx.beginPath(); ctx.moveTo(player.hookedTo.x, player.hookedTo.y); ctx.lineTo(player.x, player.y); ctx.stroke();
            }

            // Draw Shards
            shards.forEach(s => {
                if (s.collected) return;
                ctx.fillStyle = s.type === 'white' ? "#ffffff" : "#111111";
                ctx.strokeStyle = s.type === 'white' ? "#cccccc" : "#ff3838";
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(s.x, s.y - 6); ctx.lineTo(s.x + 6, s.y); ctx.lineTo(s.x, s.y + 6); ctx.lineTo(s.x - 6, s.y); ctx.closePath();
                ctx.fill(); ctx.stroke();
            });

            // Draw Player
            let skinInfo = SKINS_CONFIG[equippedSkin] || SKINS_CONFIG.default;
            if (skinInfo.splitColor) {
                let grad = ctx.createLinearGradient(player.x - player.radius, player.y, player.x + player.radius, player.y);
                grad.addColorStop(0, skinInfo.color); grad.addColorStop(1, skinInfo.splitColor);
                ctx.fillStyle = grad;
            } else {
                ctx.fillStyle = skinInfo.color;
            }
            
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            
            // Law's Room Effect (Visual only)
            if (equippedSkin === "law" && player.isSwinging) {
                ctx.strokeStyle = "rgba(0, 206, 209, 0.3)"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(player.x, player.y, 60, 0, Math.PI*2); ctx.stroke();
            }

            ctx.restore();

            if (gameStatus === "lost") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4757"; ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("WIPED OUT", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px sans-serif"; ctx.fillStyle = "#fff";
                ctx.fillText(`Distance: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = "#a4b0be"; ctx.font = "16px sans-serif";
                ctx.fillText("Press Space or Click to try again", canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        applySkinAbilities();
        renderShop();
        spawnEnvironment();
        
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
