<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWING!↺</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            user-select: none;
        }
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        canvas {
            background: #162447;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            cursor: pointer;
        }
        #ui {
            display: flex;
            gap: 30px;
            font-size: 18px;
            font-weight: bold;
            background: rgba(26, 26, 46, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #1f4068;
        }
        .score-val { color: #4ecca3; }
        .high-val { color: #f9a826; }
        .skin-val { color: #00adb5; text-transform: capitalize; }
        
        /* High Score Label Interactive Button Trigger */
        #highScoreClickable {
            cursor: pointer;
            transition: color 0.2s;
        }
        #highScoreClickable:hover {
            color: #fff;
        }
        
        /* Changing Room Styles */
        #changingRoom {
            background: rgba(22, 36, 71, 0.8);
            border: 1px solid #1f4068;
            border-radius: 8px;
            padding: 15px;
            width: 770px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #changingRoom h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .skins-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .skin-btn {
            background: #1a1a2e;
            border: 2px solid #1f4068;
            color: #888;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: not-allowed;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 75px;
            transition: all 0.2s;
        }
        .skin-btn.unlocked {
            border-color: #4ecca3;
            color: #fff;
            cursor: pointer;
        }
        .skin-btn.unlocked:hover {
            background: #1f4068;
            transform: translateY(-2px);
        }
        .skin-btn.equipped {
            border-color: #f9a826;
            background: #232342;
            color: #f9a826;
        }
        .skin-preview {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div>Score: <span id="scoreDisplay" class="score-val">0</span></div>
            <div id="highScoreClickable">High Score: <span id="highScoreDisplay" class="high-val">0</span></div>
            <div>Equipped: <span id="skinDisplay" class="skin-val">Default</span></div>
        </div>

        <canvas id="gameCanvas" width="800" height="480"></canvas>

        <div id="changingRoom">
            <h3>👕 Changing Room</h3>
            <div class="skins-grid" id="skinsGrid"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const highScoreDisplay = document.getElementById("highScoreDisplay");
        const skinDisplay = document.getElementById("skinDisplay");
        const highScoreClickable = document.getElementById("highScoreClickable");
        const skinsGrid = document.getElementById("skinsGrid");

        // --- Game Config & Physics ---
        const GRAVITY = 0.42; 
        const FRICTION = 0.996; 
        const MAX_HOOK_RANGE = 370; 

        // --- Game State ---
        let player = {
            x: 100, y: 200, vx: 6, vy: 0, radius: 12,
            isSwinging: false, hookedTo: null, ropeLength: 0
        };

        let hooks = [];
        let bouncers = []; 
        let targetHook = null;
        let cameraX = 0;
        let score = 0;
        let flameOffset = 0; // Animation tracker for devil background
        
        let highScore = parseInt(localStorage.getItem("stickman_high_score")) || 0;
        let equippedSkin = localStorage.getItem("stickman_equipped_skin") || "default";
        let gameStatus = "playing";

        // --- Skins Database Config ---
        const SKINS_CONFIG = {
            default: { name: "Default", color: "#00adb5" },
            devil: { name: "Devil", color: "#ff0055", condition: "???" }, // Hidden requirement
            brown: { name: "Brown", color: "#8b4513", score: 100 },
            green: { name: "Green", color: "#00ff00", score: 500 },
            pink: { name: "Pink", color: "#ffc0cb", score: 1000 },
            blue: { name: "Blue", color: "#0000ff", score: 5000 },
            red: { name: "Red", color: "#ff0000", score: 7000 },
            orange: { name: "Orange", color: "#ffa500", score: 10000 },
            yellow: { name: "Yellow", color: "#ffff00", score: 20000 },
            gold: { name: "Gold", color: "#d4af37", score: 100000 },
            angelic: { name: "Angelic Dev", color: "#ffffff", condition: "Secret Code" }
        };

        // --- Secret Developer Unlock triggered by clicking "High Score" text ---
        highScoreClickable.addEventListener("click", () => {
            let code = prompt("ENTER ACCESS CODE:");
            if (code && code.toUpperCase() === "IAMXAVIER") {
                localStorage.setItem("stickman_skin_angelic", "true");
                alert("😇 ANGELIC DEV MODE UNLOCKED 😇");
                renderChangingRoom();
            } else if (code !== null) {
                alert("ACCESS DENIED.");
            }
        });

        function checkUnlockStatus(key) {
            if (key === "default") return true;
            if (key === "devil") return localStorage.getItem("stickman_skin_devil") === "true";
            if (key === "angelic") return localStorage.getItem("stickman_skin_angelic") === "true";
            return highScore >= SKINS_CONFIG[key].score;
        }

        function renderChangingRoom() {
            skinsGrid.innerHTML = "";
            Object.keys(SKINS_CONFIG).forEach(key => {
                const skin = SKINS_CONFIG[key];
                const isUnlocked = checkUnlockStatus(key);
                const isEquipped = equippedSkin === key;

                const btn = document.createElement("button");
                btn.className = `skin-btn ${isUnlocked ? 'unlocked' : ''} ${isEquipped ? 'equipped' : ''}`;
                
                const preview = document.createElement("span");
                preview.className = "skin-preview";
                preview.style.backgroundColor = skin.color;
                btn.appendChild(preview);
                
                const nameLabel = document.createElement("span");
                nameLabel.textContent = skin.name;
                btn.appendChild(nameLabel);

                const infoLabel = document.createElement("span");
                infoLabel.style.fontSize = "9px";
                infoLabel.style.color = "#666";
                if (skin.score !== undefined) infoLabel.textContent = `Score: ${skin.score}`;
                else if (skin.condition) infoLabel.textContent = skin.condition;
                btn.appendChild(infoLabel);

                if (isUnlocked) {
                    btn.addEventListener("click", () => {
                        equippedSkin = key;
                        localStorage.setItem("stickman_equipped_skin", key);
                        skinDisplay.textContent = skin.name;
                        skinDisplay.style.color = skin.color;
                        renderChangingRoom();
                    });
                }
                skinsGrid.appendChild(btn);
            });

            skinDisplay.textContent = SKINS_CONFIG[equippedSkin].name;
            skinDisplay.style.color = SKINS_CONFIG[equippedSkin].color;
        }

        // Initialize display values
        highScoreDisplay.textContent = highScore;
        renderChangingRoom();

        // --- Controls Scopes ---
        canvas.addEventListener("mousedown", handleActionStart);
        window.addEventListener("mouseup", handleActionEnd);
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleActionStart(); }, { passive: false });
        window.addEventListener("touchend", (e) => { e.preventDefault(); handleActionEnd(); }, { passive: false });

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") { e.preventDefault(); handleActionStart(); }
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "Space") handleActionEnd();
        });

        function handleActionStart() {
            if (gameStatus !== "playing") { resetGame(); return; }
            if (targetHook && !player.isSwinging) {
                let dx = targetHook.x - player.x;
                let dy = targetHook.y - player.y;
                player.isSwinging = true;
                player.hookedTo = targetHook;
                player.ropeLength = Math.sqrt(dx * dx + dy * dy);
            }
        }

        function handleActionEnd() {
            player.isSwinging = false;
            player.hookedTo = null;
        }

        // --- Procedural World Generation ---
        function manageEnvironment() {
            if (hooks.length === 0) {
                hooks.push({ x: 300, y: 160 });
            }

            let lastHook = hooks[hooks.length - 1];
            while (lastHook.x < player.x + 1000) {
                let nextX = lastHook.x + Math.floor(Math.random() * 100) + 190; 
                let nextY = Math.floor(Math.random() * 130) + 100; 
                
                hooks.push({ x: nextX, y: nextY });

                let rand = Math.random();
                if (rand < 0.35) {
                    bouncers.push({ type: "horizontal", x: nextX - 50, y: 430, width: 65, height: 12 });
                } else if (rand < 0.55) {
                    bouncers.push({ type: "vertical", x: nextX - 110, y: nextY + 50, width: 14, height: 80 });
                }
                lastHook = hooks[hooks.length - 1];
            }

            hooks = hooks.filter(h => h.x > cameraX - 100);
            bouncers = bouncers.filter(b => b.x > cameraX - 100);
        }

        function findClosestTarget() {
            let closestHook = null;
            let minDist = Infinity;

            hooks.forEach(hook => {
                let dx = hook.x - player.x;
                let dy = hook.y - player.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < minDist && hook.x > player.x - 30 && dist < MAX_HOOK_RANGE) {
                    minDist = dist;
                    closestHook = hook;
                }
            });
            targetHook = closestHook;
        }

        function checkCollision(circle, rect) {
            let closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
            let closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
            let dx = circle.x - closestX;
            let dy = circle.y - closestY;
            return (dx * dx + dy * dy) < (circle.radius * circle.radius);
        }

        function resetGame() {
            player.x = 100; player.y = 200; player.vx = 6; player.vy = 0;
            player.isSwinging = false; player.hookedTo = null;
            hooks = []; bouncers = []; score = 0;
            scoreDisplay.textContent = 0;
            manageEnvironment();
            gameStatus = "playing";
        }

        // --- Core Game Update Loop ---
        function update() {
            if (gameStatus !== "playing") return;

            player.vy += GRAVITY;
            player.vx *= FRICTION;
            player.vy *= FRICTION;
            player.x += player.vx;
            player.y += player.vy;

            manageEnvironment();

            if (!player.isSwinging) {
                findClosestTarget();
            }

            // Flashing animation incremental offset 
            flameOffset += 0.15;

            // Advanced Directional Kinetic Bounce Mechanics
            bouncers.forEach(pad => {
                if (checkCollision(player, pad)) {
                    if (pad.type === "horizontal") {
                        player.y = pad.y - player.radius;
                        player.vy = -Math.max(Math.abs(player.vy) * 1.35, 11);
                        player.vx *= 1.25;
                    } else if (pad.type === "vertical") {
                        if (player.x < pad.x) {
                            player.x = pad.x - player.radius;
                            player.vx = -Math.max(Math.abs(player.vx) * 1.35, 8);
                        } else {
                            player.x = pad.x + pad.width + player.radius;
                            player.vx = Math.max(Math.abs(player.vx) * 1.35, 8);
                        }
                        player.vy = -Math.max(Math.abs(player.vy) * 0.9, 5);
                    }
                    player.isSwinging = false;
                    player.hookedTo = null;
                }
            });

            // Pendulum Cable Constraint
            if (player.isSwinging && player.hookedTo) {
                let hook = player.hookedTo;
                let dx = player.x - hook.x;
                let dy = player.y - hook.y;
                let currentDist = Math.sqrt(dx * dx + dy * dy);

                if (currentDist > player.ropeLength) {
                    let angle = Math.atan2(dy, dx);
                    player.x = hook.x + Math.cos(angle) * player.ropeLength;
                    player.y = hook.y + Math.sin(angle) * player.ropeLength;

                    let nx = dx / currentDist;
                    let ny = dy / currentDist;
                    let velAlongNormal = player.vx * nx + player.vy * ny;

                    player.vx -= velAlongNormal * nx;
                    player.vy -= velAlongNormal * ny;
                    player.vx += Math.sin(angle) * 0.14; 
                }
            }

            cameraX = player.x - 200;

            // Position-based scoring
            score = Math.floor(player.x / 10) - 10;
            scoreDisplay.textContent = score;

            // Check Defeat Threshold
            if (player.y > canvas.height + 140) {
                gameStatus = "lost";

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("stickman_high_score", highScore);
                    highScoreDisplay.textContent = highScore;
                }

                // Devil Skin Secret Unlock Condition
                if (score < 0 && localStorage.getItem("stickman_skin_devil") !== "true") {
                    localStorage.setItem("stickman_skin_devil", "true");
                    alert("👹 UNLOCKED: THE DEVIL SKIN!");
                }

                renderChangingRoom();
            }
        }

        // --- Environmental Backdrop Renderers ---
        function drawDevilBackground() {
            // Dark underworld gradient floor fill
            let baseGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            baseGrad.addColorStop(0, "#0b0005");
            baseGrad.addColorStop(0.7, "#22000b");
            baseGrad.addColorStop(1, "#4a0010");
            ctx.fillStyle = baseGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw dynamic procedural rising flame vectors
            ctx.fillStyle = "rgba(233, 69, 96, 0.18)";
            for (let i = 0; i < canvas.width + 100; i += 40) {
                let flameHeight = 80 + Math.sin((i / 20) + flameOffset) * 25;
                ctx.beginPath();
                ctx.moveTo(i, canvas.height);
                ctx.quadraticCurveTo(i + 20, canvas.height - flameHeight, i + 40, canvas.height);
                ctx.fill();
            }
            ctx.fillStyle = "rgba(255, 159, 67, 0.12)";
            for (let i = -20; i < canvas.width + 100; i += 50) {
                let flameHeight = 60 + Math.cos((i / 15) + flameOffset) * 20;
                ctx.beginPath();
                ctx.moveTo(i, canvas.height);
                ctx.quadraticCurveTo(i + 25, canvas.height - flameHeight, i + 50, canvas.height);
                ctx.fill();
            }
        }

        function drawAngelicBackground() {
            // Bright celestial sky gradient
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, "#74b9ff");
            skyGrad.addColorStop(0.6, "#a29bfe");
            skyGrad.addColorStop(1, "#dfe6e9");
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Sun beaming down rays from fixed upper center
            let sunX = canvas.width / 2;
            let sunY = -20;
            ctx.fillStyle = "rgba(255, 255, 210, 0.08)";
            for (let i = 0; i < Math.PI * 2; i += Math.PI / 8) {
                ctx.beginPath();
                ctx.moveTo(sunX, sunY);
                ctx.arc(sunX, sunY, 900, i - 0.1, i + 0.1);
                ctx.fill();
            }

            // Stationary Ambient background puffy clouds
            ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
            function drawCloud(cx, cy, scale) {
                ctx.beginPath();
                ctx.arc(cx, cy, 30 * scale, 0, Math.PI * 2);
                ctx.arc(cx + 25 * scale, cy - 10 * scale, 40 * scale, 0, Math.PI * 2);
                ctx.arc(cx + 60 * scale, cy, 30 * scale, 0, Math.PI * 2);
                ctx.fill();
            }
            drawCloud(100, 120, 1.2);
            drawCloud(450, 80, 1.5);
            drawCloud(680, 160, 1);
        }

        function drawDefaultBackground() {
            // Original grid look
            ctx.fillStyle = "#162447";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, 0);
            ctx.strokeStyle = "#1f4068";
            ctx.lineWidth = 1;
            let startGridX = Math.floor(cameraX / 100) * 100;
            for (let i = startGridX; i < startGridX + canvas.width + 200; i += 100) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            ctx.restore();
        }

        // --- Render Frame Loops ---
        function draw() {
            // Render Selected Atmospheric Background Mode
            if (equippedSkin === "devil") drawDevilBackground();
            else if (equippedSkin === "angelic") drawAngelicBackground();
            else drawDefaultBackground();

            ctx.save();
            ctx.translate(-cameraX, 0);

            // Draw Bounce Elements
            bouncers.forEach(pad => {
                if (pad.type === "horizontal") {
                    ctx.fillStyle = "#e94560";
                    ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
                    ctx.fillStyle = "#ffdd59";
                    ctx.fillRect(pad.x + 4, pad.y + 2, pad.width - 8, 3);
                } else if (pad.type === "vertical") {
                    ctx.fillStyle = "#00ffcc";
                    ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(pad.x + 2, pad.y + 4, pad.width - 4, pad.height - 8);
                }
            });

            // Draw Hooks
            hooks.forEach(hook => {
                let isTargeted = (hook === targetHook && !player.isSwinging);
                
                // Color match hook centers slightly to the themes if chosen
                if (equippedSkin === "devil") ctx.fillStyle = "#ff0055";
                else if (equippedSkin === "angelic") ctx.fillStyle = "#fab1a0";
                else ctx.fillStyle = isTargeted ? "#4ecca3" : "#e94560";
                
                ctx.beginPath();
                ctx.arc(hook.x, hook.y, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = isTargeted ? "rgba(78, 204, 163, 0.5)" : "rgba(233, 69, 96, 0.2)";
                ctx.lineWidth = isTargeted ? 4 : 2;
                ctx.beginPath();
                ctx.arc(hook.x, hook.y, 16, 0, Math.PI * 2);
                ctx.stroke();

                if (isTargeted) {
                    ctx.strokeStyle = equippedSkin === "angelic" ? "#ffffff" : "#4ecca3";
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.arc(hook.x, hook.y, 25, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });

            // Draw Custom Dynamic Rope Styles
            if (player.isSwinging && player.hookedTo) {
                if (equippedSkin === "devil") {
                    // Glowing Red Rope
                    ctx.strokeStyle = "#ff0055";
                    ctx.shadowColor = "#ff0055";
                    ctx.shadowBlur = 10;
                    ctx.lineWidth = 3.5;
                } else if (equippedSkin === "angelic") {
                    // Heavenly Golden Braided Rope
                    ctx.strokeStyle = "#ffeaa7";
                    ctx.lineWidth = 3;
                } else {
                    // Standard White Cable
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 3;
                }

                ctx.beginPath();
                ctx.moveTo(player.hookedTo.x, player.hookedTo.y);
                ctx.lineTo(player.x, player.y);
                ctx.stroke();
                
                // Clear shadows to prevent performance drain on other elements
                ctx.shadowBlur = 0;
            }

            // Draw Player Blob
            ctx.fillStyle = SKINS_CONFIG[equippedSkin].color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // Angel Halo Overlay
            if (equippedSkin === "angelic") {
                ctx.strokeStyle = "#ffeaa7";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.ellipse(player.x, player.y - 20, 14, 4, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Devil Horns Overlay
            if (equippedSkin === "devil") {
                ctx.fillStyle = "#ff0055";
                ctx.beginPath(); ctx.moveTo(player.x - 8, player.y - 8); ctx.lineTo(player.x - 14, player.y - 18); ctx.lineTo(player.x - 2, player.y - 11); ctx.fill();
                ctx.beginPath(); ctx.moveTo(player.x + 8, player.y - 8); ctx.lineTo(player.x + 14, player.y - 18); ctx.lineTo(player.x + 2, player.y - 11); ctx.fill();
            }

            ctx.restore();

            // End Screen Game Over Banner
            if (gameStatus === "lost") {
                ctx.fillStyle = "rgba(15, 15, 26, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = score < 0 ? "#ff0055" : "#e94560";
                ctx.font = "bold 42px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(score < 0 ? "UNDERWORLD DESCENT" : "GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = "20px sans-serif";
                ctx.fillStyle = "#fff";
                ctx.fillText(`Final Score: ${score} points`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = "#888";
                ctx.fillText("Press Space or Click the arena to snap back in!", canvas.width / 2, canvas.height / 2 + 65);
            }
        }

        manageEnvironment();
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
