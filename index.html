<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☯️</text></svg>">
    <title>Swing!</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            user-select: none;
        }
        
        #main-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 1100px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        
        #sidebar {
            width: 260px;
            background: rgba(22, 36, 71, 0.9);
            border: 1px solid #1f4068;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            height: 700px;
            display: flex;
            flex-direction: column;
        }
        #sidebar h3 {
            margin: 0 0 15px 0;
            color: #f9a826;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 18px;
            text-align: center;
            border-bottom: 2px solid #1f4068;
            padding-bottom: 8px;
        }
        #leaderboardList {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #leaderboardList::-webkit-scrollbar { width: 6px; }
        #leaderboardList::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 4px; }
        #leaderboardList::-webkit-scrollbar-thumb { background: #f9a826; border-radius: 4px; }

        .leaderboard-item {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1f4068;
            font-size: 14px;
        }
        .leaderboard-rank { font-weight: bold; color: #00adb5; margin-right: 5px; }
        .leaderboard-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .leaderboard-score { color: #4ecca3; font-weight: bold; }

        #authContainer {
            background: rgba(22, 36, 71, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1f4068;
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
        }
        .auth-input { padding: 8px; border-radius: 4px; border: 1px solid #1a1a2e; background: #1a1a2e; color: white; width: 110px; }
        .auth-btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .auth-btn:hover { opacity: 0.8; }
        #loginBtn { background: #4ecca3; color: #1a1a2e; }
        #registerBtn { background: #00adb5; color: #fff; }
        #welcomeMessage { display: none; font-weight: bold; color: #4ecca3; font-size: 16px; }
        #authInputs { display: flex; gap: 10px; }

        canvas {
            background: #162447;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 800px;
        }
        
        #ui {
            display: flex;
            gap: 15px;
            font-size: 15px;
            font-weight: bold;
            background: rgba(26, 26, 46, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #1f4068;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
        }
        .score-val { color: #4ecca3; }
        .high-val { color: #f9a826; }
        .coin-val { color: #ffd700; }
        .skin-val { color: #00adb5; text-transform: capitalize; }
        
        .clickable-ui { cursor: pointer; transition: color 0.2s; }
        .clickable-ui:hover { color: #fff; }
        
        #shardDisplay { display: flex; gap: 8px; }
        .shard { width: 15px; height: 15px; border-radius: 3px; border: 1px solid #555; opacity: 0.2; }
        .shard.owned { opacity: 1; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .shard-black { background: #000; border-color: #fff; }
        .shard-white { background: #fff; border-color: #000; }

        #bottom-panels {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .panel-box {
            background: rgba(22, 36, 71, 0.8);
            border: 1px solid #1f4068;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        
        #changingRoom { flex: 2; }
        #upgradeShop { flex: 1; }
        
        .panel-box h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #1f4068;
            padding-bottom: 5px;
        }
        
        .skins-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-start;
            max-height: 110px; 
            overflow-y: auto;
            padding-right: 5px;
        }
        .skins-grid::-webkit-scrollbar { width: 8px; }
        .skins-grid::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 4px; }
        .skins-grid::-webkit-scrollbar-thumb { background: #00adb5; border-radius: 4px; }

        .skin-btn {
            background: #1a1a2e;
            border: 2px solid #1f4068;
            color: #888;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: not-allowed;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 80px;
            transition: all 0.2s;
            position: relative;
        }
        .skin-btn.unlocked { border-color: #4ecca3; color: #fff; }
        .skin-btn.unlocked:hover { background: #1f4068; transform: translateY(-2px); }
        .skin-btn.equipped { border-color: #f9a826; background: #232342; color: #f9a826; }
        .skin-btn.sub-skin { border-style: dashed; background: #162447; transform: scale(0.95); }
        .skin-preview { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid rgba(255,255,255,0.2); }
        
        .ability-text { font-size: 9px; color: #ffeb3b; text-align: center; line-height: 1.1; margin-top: 2px;}

        .dropdown-arrow {
            position: absolute; top: -8px; right: -8px; background: #f9a826; color: #1a1a2e;
            border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex;
            justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10;
        }
        .dropdown-arrow:hover { background: #fff; }

        #fuseBtn {
            position: absolute; top: 10px; right: 15px;
            background: linear-gradient(90deg, #ffffff 50%, #000000 50%);
            color: #1a1a2e; border: 2px solid #f9a826; padding: 5px 10px; font-size: 11px;
            border-radius: 6px; font-weight: bold; cursor: pointer; display: none;
            text-shadow: 0px 0px 4px #fff; box-shadow: 0 0 10px #f9a826; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .upgrade-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #1a1a2e; padding: 6px 10px; border-radius: 6px; margin-bottom: 6px;
            border: 1px solid #1f4068; font-size: 12px;
        }
        .upgrade-info { display: flex; flex-direction: column; gap: 2px; }
        .upgrade-name { font-weight: bold; color: #4ecca3; }
        .upgrade-lvl { font-size: 10px; color: #888; }
        .buy-btn {
            background: #f9a826; color: #1a1a2e; border: none; border-radius: 4px;
            padding: 4px 8px; font-weight: bold; cursor: pointer; font-size: 11px;
        }
        .buy-btn:hover { background: #fff; }
        .buy-btn:disabled { background: #555; color: #888; cursor: not-allowed; }

    </style>
</head>
<body>

    <div id="main-layout">
        <div id="game-container">
            <div id="authContainer">
                <div>☁️ Cloud Save</div>
                <div id="authInputs">
                    <input type="text" id="usernameInput" class="auth-input" placeholder="Username">
                    <input type="password" id="passwordInput" class="auth-input" placeholder="Password">
                    <button id="loginBtn" class="auth-btn">Login</button>
                    <button id="registerBtn" class="auth-btn">Register</button>
                </div>
                <div id="welcomeMessage"></div>
            </div>

            <div id="ui">
                <div>Score: <span id="scoreDisplay" class="score-val">0</span></div>
                <div id="highScoreClickable" class="clickable-ui">High: <span id="highScoreDisplay" class="high-val">0</span></div>
                <div>🪙 Coins: <span id="coinDisplay" class="coin-val">0</span></div>
                <div id="equippedClickable" class="clickable-ui">Skin: <span id="skinDisplay" class="skin-val">Default</span></div>
                <div id="shardDisplay">
                    <div id="whiteShard" class="shard shard-white" title="White Shard"></div>
                    <div id="blackShard" class="shard shard-black" title="Black Shard"></div>
                </div>
            </div>

            <canvas id="gameCanvas" width="800" height="420"></canvas>

            <div id="bottom-panels">
                <div id="changingRoom" class="panel-box">
                    <h3>👕 Changing Room</h3>
                    <button id="fuseBtn">FUSE?</button>
                    <div class="skins-grid" id="skinsGrid"></div>
                </div>

                <div id="upgradeShop" class="panel-box">
                    <h3>🛒 Upgrades</h3>
                    <div id="shopContent"></div>
                </div>
            </div>
        </div>

        <div id="sidebar">
            <h3>🏆 Leaderboard</h3>
            <div id="leaderboardList">
                <div style="text-align: center; color: #666; margin-top: 20px;">Loading scores...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://swingworker.xaviersgames.workers.dev";
        let currentUser = null;
        let currentPassword = null;
        let unlockedSkinsArray = [];

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const highScoreDisplay = document.getElementById("highScoreDisplay");
        const coinDisplay = document.getElementById("coinDisplay");
        const skinDisplay = document.getElementById("skinDisplay");
        const skinsGrid = document.getElementById("skinsGrid");
        const shopContent = document.getElementById("shopContent");
        const fuseBtn = document.getElementById("fuseBtn");
        const leaderboardList = document.getElementById("leaderboardList");

        // --- Game Config & Economy State ---
        let highScore = parseInt(localStorage.getItem("stickman_high_score")) || 0;
        let coins = parseInt(localStorage.getItem("stickman_coins")) || 0;
        let equippedSkin = localStorage.getItem("stickman_equipped_skin") || "default";
        
        let upgrades = JSON.parse(localStorage.getItem("stickman_upgrades")) || { hook: 0, bounce: 0, magnet: 0 };
        const MAX_UPGRADE_LEVEL = 5;

        // Base Physics Constants
        const BASE_GRAVITY = 0.42; 
        const BASE_FRICTION = 0.996; 
        const BASE_HOOK_RANGE = 370; 

        // Mutable Physics State
        let currentGravity = BASE_GRAVITY;
        let currentFriction = BASE_FRICTION;
        let maxHookRange = BASE_HOOK_RANGE;
        let currentBouncePower = 0;
        let currentCoinMult = 1;
        let magnetRadius = 0;

        let player = { x: 100, y: 200, vx: 6, vy: 0, radius: 12, isSwinging: false, hookedTo: null, ropeLength: 0 };
        let hooks = []; let bouncers = []; let portals = []; let coinEntities = [];
        let targetHook = null; let cameraX = 0; let score = 0; let flameOffset = 0; 
        
        let angelicDropdownOpen = false; let devilDropdownOpen = false;
        let gameStatus = "playing"; let currentRealm = null; 

        let fusionAngle = 0; let fusionSpeed = 0.05; let fusionDistance = 150; let fusionFlash = 0;

        Object.keys(localStorage).forEach(key => {
            if (key.startsWith("stickman_skin_") && localStorage.getItem(key) === "true") {
                let skinName = key.replace("stickman_skin_", "");
                if (!unlockedSkinsArray.includes(skinName)) unlockedSkinsArray.push(skinName);
            }
        });

        // --- Skins Database with Abilities ---
        const SKINS_CONFIG = {
            og_stickman: { name: "Exquisite OG", color: "#ff00ff", condition: "First 10 Players", ability: "Looking Dapper" },
            default: { name: "Default", color: "#00adb5" },
            brown: { name: "Brown", color: "#8b4513", score: 100, ability: "+ Hook Range" },
            green: { name: "Green", color: "#00ff00", score: 500, ability: "+ Bounce" },
            pink: { name: "Pink", color: "#ffc0cb", score: 1000, ability: "Low Gravity" },
            blue: { name: "Blue", color: "#0000ff", score: 5000, ability: "Slippery" },
            red: { name: "Red", color: "#ff0000", score: 7000, ability: "Heavy Momentum" },
            orange: { name: "Orange", color: "#ffa500", score: 10000, ability: "x2 Coins" },
            yellow: { name: "Yellow", color: "#ffff00", score: 20000, ability: "Base Magnet" },
            gold: { name: "Gold", color: "#d4af37", score: 100000, ability: "x5 Coins + Magnet" },
            
            angelic: { name: "Angelic Dev", color: "#ffffff", condition: "Secret Code" },
            denied_angel: { name: "Denied Angel", color: "#ffffff", condition: "???", parent: "angelic" },
            accurate_angel: { name: "Accurate Angel", color: "#ffffff", condition: "???", parent: "angelic" },
            exalted_angel: { name: "Exalted Angel", color: "#ffffff", condition: "???", parent: "angelic" },
            
            devil: { name: "Devil", color: "#ff0055", condition: "???" }, 
            denied_devil: { name: "Denied Devil", color: "#ff0055", condition: "???", parent: "devil" },
            accurate_devil: { name: "Accurate Devil", color: "#d4af37", condition: "???", parent: "devil" },
            exalted_devil: { name: "Exalted Devil", color: "#ff0055", condition: "???", parent: "devil" },

            yin_yang: { name: "Yin Yang", color: "#ffffff", splitColor: "#000000", condition: "Merge Shards" },
            split_fire_ice: { name: "Fire & Ice", color: "#ff4500", splitColor: "#00ced1", condition: "Gacha Roll" },
            split_toxic_bio: { name: "Toxic Bio", color: "#32cd32", splitColor: "#8a2be2", condition: "Gacha Roll" },
            split_solar_lunar: { name: "Solar Lunar", color: "#ffd700", splitColor: "#191970", condition: "Gacha Roll" },
            split_neon_synth: { name: "Neon Synth", color: "#ff00ff", splitColor: "#00ffff", condition: "Gacha Roll" }
        };

        // --- CLOUDFLARE API & SYNC ---
        async function fetchLeaderboard() {
            try {
                const res = await fetch(`${API_URL}/api/leaderboard`);
                const data = await res.json();
                if (data.success) {
                    leaderboardList.innerHTML = "";
                    if (data.leaderboard.length === 0) return leaderboardList.innerHTML = '<div style="text-align: center; color: #666; margin-top: 20px;">No scores recorded yet!</div>';
                    data.leaderboard.forEach((row, index) => {
                        const item = document.createElement("div"); item.className = "leaderboard-item";
                        if(currentUser && row.username === currentUser) { item.style.borderColor = "#4ecca3"; item.style.background = "#232342"; }
                        item.innerHTML = `<div><span class="leaderboard-rank">#${index + 1}</span><span class="leaderboard-name">${row.username}</span></div><span class="leaderboard-score">${row.score}</span>`;
                        leaderboardList.appendChild(item);
                    });
                }
            } catch (e) { leaderboardList.innerHTML = '<div style="text-align: center; color: #ff0055; margin-top: 20px;">Offline Mode.</div>'; }
        }
        fetchLeaderboard();

        function saveLocalData() {
            localStorage.setItem("stickman_high_score", highScore);
            localStorage.setItem("stickman_coins", coins);
            localStorage.setItem("stickman_equipped_skin", equippedSkin);
            localStorage.setItem("stickman_upgrades", JSON.stringify(upgrades));
        }

        async function syncCloudSave() {
            saveLocalData();
            if (!currentUser) return; 
            const payload = {
                username: currentUser, password: currentPassword, high_score: highScore, equipped_skin: equippedSkin,
                coins: coins, upgrades: upgrades,
                black_shard: localStorage.getItem("stickman_black_shard") === "true",
                white_shard: localStorage.getItem("stickman_white_shard") === "true",
                unlocked_skins: unlockedSkinsArray
            };
            try { await fetch(`${API_URL}/api/save`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }); fetchLeaderboard(); } catch (e) {}
        }

        function unlockSkin(skinKey) {
            if (!unlockedSkinsArray.includes(skinKey)) unlockedSkinsArray.push(skinKey);
            localStorage.setItem(`stickman_skin_${skinKey}`, "true"); syncCloudSave();
        }

        // --- AUTH ---
        document.getElementById("registerBtn").addEventListener("click", async () => { /* Logic hidden for brevity */ });
        document.getElementById("loginBtn").addEventListener("click", async () => { /* Logic hidden for brevity */ });

        // --- UNLOCK & RENDER LOGIC ---
        function checkUnlockStatus(key) {
            if (key === "default") return true;
            if (unlockedSkinsArray && unlockedSkinsArray.includes(key)) return true; 
            if (SKINS_CONFIG[key].condition && SKINS_CONFIG[key].score === undefined) return localStorage.getItem(`stickman_skin_${key}`) === "true"; 
            if (SKINS_CONFIG[key].score !== undefined) return highScore >= SKINS_CONFIG[key].score;
            return false;
        }

        function renderChangingRoom() {
            skinsGrid.innerHTML = "";
            document.getElementById("blackShard").classList.toggle("owned", localStorage.getItem("stickman_black_shard") === "true");
            document.getElementById("whiteShard").classList.toggle("owned", localStorage.getItem("stickman_white_shard") === "true");

            const hasAngelSubSkins = checkUnlockStatus("denied_angel") || checkUnlockStatus("accurate_angel") || checkUnlockStatus("exalted_angel");
            const hasDevilSubSkins = checkUnlockStatus("denied_devil") || checkUnlockStatus("accurate_devil") || checkUnlockStatus("exalted_devil");

            Object.keys(SKINS_CONFIG).forEach(key => {
                const skin = SKINS_CONFIG[key];
                if (skin.parent === "angelic" && !angelicDropdownOpen) return;
                if (skin.parent === "devil" && !devilDropdownOpen) return;

                const isUnlocked = checkUnlockStatus(key); const isEquipped = equippedSkin === key;

                const btn = document.createElement("button");
                btn.className = `skin-btn ${isUnlocked ? 'unlocked' : ''} ${isEquipped ? 'equipped' : ''}`;
                if (skin.parent) btn.classList.add("sub-skin");
                
                const preview = document.createElement("span"); preview.className = "skin-preview";
                if (skin.splitColor) preview.style.background = `linear-gradient(90deg, ${skin.color} 50%, ${skin.splitColor} 50%)`;
                else preview.style.backgroundColor = skin.color;
                btn.appendChild(preview);
                
                const nameLabel = document.createElement("span"); nameLabel.textContent = skin.name; btn.appendChild(nameLabel);
                
                const infoLabel = document.createElement("span"); infoLabel.style.fontSize = "9px"; infoLabel.style.color = "#666";
                if (skin.score !== undefined) infoLabel.textContent = `Score: ${skin.score}`;
                else if (skin.condition) infoLabel.textContent = skin.condition;
                btn.appendChild(infoLabel);

                if (skin.ability) {
                    const abLabel = document.createElement("span"); abLabel.className = "ability-text";
                    abLabel.textContent = skin.ability; btn.appendChild(abLabel);
                }

                if (key === "angelic" && isUnlocked && hasAngelSubSkins) {
                    const arrow = document.createElement("div"); arrow.className = "dropdown-arrow"; arrow.textContent = angelicDropdownOpen ? "▲" : "▼";
                    arrow.addEventListener("click", (e) => { e.stopPropagation(); angelicDropdownOpen = !angelicDropdownOpen; renderChangingRoom(); }); btn.appendChild(arrow);
                }
                if (key === "devil" && isUnlocked && hasDevilSubSkins) {
                    const arrow = document.createElement("div"); arrow.className = "dropdown-arrow"; arrow.textContent = devilDropdownOpen ? "▲" : "▼";
                    arrow.addEventListener("click", (e) => { e.stopPropagation(); devilDropdownOpen = !devilDropdownOpen; renderChangingRoom(); }); btn.appendChild(arrow);
                }

                if (isUnlocked) {
                    btn.style.cursor = "pointer";
                    btn.onclick = () => { equippedSkin = key; applySkinAbilities(); saveLocalData(); renderChangingRoom(); };
                }
                skinsGrid.appendChild(btn);
            });

            skinDisplay.textContent = SKINS_CONFIG[equippedSkin] ? SKINS_CONFIG[equippedSkin].name : "Default";
            skinDisplay.style.color = SKINS_CONFIG[equippedSkin] ? SKINS_CONFIG[equippedSkin].color : "#00adb5";
            highScoreDisplay.textContent = highScore; coinDisplay.textContent = coins;
            applySkinAbilities();
        }

        // --- UPGRADE SHOP ---
        const SHOP_CONFIG = {
            hook: { name: "Grapple Cable+", baseCost: 50, desc: "Increases hook range." },
            bounce: { name: "Bouncy Pads+", baseCost: 50, desc: "More height on pads." },
            magnet: { name: "Coin Magnet+", baseCost: 100, desc: "Pulls coins to you." }
        };

        function renderShop() {
            shopContent.innerHTML = "";
            Object.keys(SHOP_CONFIG).forEach(key => {
                const conf = SHOP_CONFIG[key]; const lvl = upgrades[key];
                const cost = conf.baseCost * (lvl + 1);
                const isMax = lvl >= MAX_UPGRADE_LEVEL;

                const item = document.createElement("div"); item.className = "upgrade-item";
                item.innerHTML = `
                    <div class="upgrade-info">
                        <span class="upgrade-name">${conf.name} <span class="upgrade-lvl">Lvl ${lvl}/${MAX_UPGRADE_LEVEL}</span></span>
                        <span style="font-size: 9px; color: #888;">${conf.desc}</span>
                    </div>
                `;
                const btn = document.createElement("button"); btn.className = "buy-btn";
                if (isMax) { btn.textContent = "MAX"; btn.disabled = true; } 
                else {
                    btn.textContent = `🪙 ${cost}`;
                    if (coins < cost) btn.disabled = true;
                    btn.onclick = () => {
                        coins -= cost; upgrades[key]++; saveLocalData(); renderShop(); renderChangingRoom(); applySkinAbilities();
                    };
                }
                item.appendChild(btn); shopContent.appendChild(item);
            });
            coinDisplay.textContent = coins;
        }

        function applySkinAbilities() {
            // Reset to base + upgrades
            currentGravity = BASE_GRAVITY;
            currentFriction = BASE_FRICTION;
            maxHookRange = BASE_HOOK_RANGE + (upgrades.hook * 20);
            currentBouncePower = (upgrades.bounce * 1.5);
            currentCoinMult = 1;
            magnetRadius = (upgrades.magnet * 35);

            // Apply Skin Overrides
            if (equippedSkin === "pink") currentGravity = 0.32;
            if (equippedSkin === "red") currentGravity = 0.55; 
            if (equippedSkin === "blue") currentFriction = 0.9995; 
            if (equippedSkin === "brown") maxHookRange += 60;
            if (equippedSkin === "green") currentBouncePower += 3;
            if (equippedSkin === "orange") currentCoinMult = 2;
            if (equippedSkin === "yellow") magnetRadius += 60;
            if (equippedSkin === "gold") { currentCoinMult = 5; magnetRadius += 100; }
        }

        renderShop(); renderChangingRoom();

        // --- Controls & Gameplay Loop ---
        canvas.addEventListener("mousedown", handleActionStart); window.addEventListener("mouseup", handleActionEnd);
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleActionStart(); }, { passive: false });
        window.addEventListener("touchend", (e) => { e.preventDefault(); handleActionEnd(); }, { passive: false });
        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); handleActionStart(); } });
        window.addEventListener("keyup", (e) => { if (e.code === "Space") handleActionEnd(); });

        function handleActionStart() {
            if (gameStatus === "lost") { resetGame(); return; }
            if (targetHook && !player.isSwinging) {
                let dx = targetHook.x - player.x; let dy = targetHook.y - player.y;
                player.isSwinging = true; player.hookedTo = targetHook; player.ropeLength = Math.sqrt(dx * dx + dy * dy);
            }
        }
        function handleActionEnd() { player.isSwinging = false; player.hookedTo = null; }

        function manageEnvironment() {
            if (hooks.length === 0) hooks.push({ x: player.x + 200, y: 160 });
            let lastHook = hooks[hooks.length - 1];
            while (lastHook.x < player.x + 1000) {
                let nextX = lastHook.x + Math.floor(Math.random() * 100) + 190; 
                let nextY = Math.floor(Math.random() * 130) + 100; 
                hooks.push({ x: nextX, y: nextY });

                let rand = Math.random();
                if (rand < 0.35) bouncers.push({ type: "horizontal", x: nextX - 50, y: 400, width: 65, height: 12 });
                else if (rand < 0.55) bouncers.push({ type: "vertical", x: nextX - 110, y: nextY + 50, width: 14, height: 80 });

                // Spawn Coins
                if (Math.random() < 0.4) {
                    let coinY = nextY + (Math.random() * 100 - 50);
                    coinEntities.push({ x: nextX + 50, y: coinY, collected: false });
                    // Sometimes spawn clusters
                    if (Math.random() < 0.3) {
                        coinEntities.push({ x: nextX + 75, y: coinY, collected: false });
                        coinEntities.push({ x: nextX + 100, y: coinY, collected: false });
                    }
                }

                lastHook = hooks[hooks.length - 1];
            }
            hooks = hooks.filter(h => h.x > cameraX - 100); 
            bouncers = bouncers.filter(b => b.x > cameraX - 100); 
            coinEntities = coinEntities.filter(c => c.x > cameraX - 100 && !c.collected);
        }

        function findClosestTarget() {
            let closestHook = null; let minDist = Infinity;
            hooks.forEach(hook => {
                let dx = hook.x - player.x; let dy = hook.y - player.y; let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist && hook.x > player.x - 30 && dist < maxHookRange) { minDist = dist; closestHook = hook; }
            });
            targetHook = closestHook;
        }

        function checkCollision(circle, rect) {
            let closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width)); let closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
            let dx = circle.x - closestX; let dy = circle.y - closestY;
            return (dx * dx + dy * dy) < (circle.radius * circle.radius);
        }

        function resetGame() {
            player.x = 100; player.y = 200; player.vx = 6; player.vy = 0; player.isSwinging = false; player.hookedTo = null;
            hooks = []; bouncers = []; coinEntities = []; score = 0; scoreDisplay.textContent = 0; manageEnvironment(); gameStatus = "playing";
        }

        function update() {
            if (gameStatus === "lost") return;
            
            // Physics
            player.vy += currentGravity; player.vx *= currentFriction; player.vy *= currentFriction; 
            player.x += player.vx; player.y += player.vy;

            manageEnvironment();
            if (!player.isSwinging) findClosestTarget();
            flameOffset += 0.05;

            // Coin Logic
            coinEntities.forEach(c => {
                if (c.collected) return;
                let dx = player.x - c.x; let dy = player.y - c.y; let dist = Math.sqrt(dx*dx + dy*dy);
                
                // Magnet
                if (magnetRadius > 0 && dist < magnetRadius && dist > player.radius) {
                    c.x += dx * 0.1; c.y += dy * 0.1; 
                }
                // Collision
                if (dist < player.radius + 12) {
                    c.collected = true; coins += 1 * currentCoinMult;
                    coinDisplay.textContent = coins;
                }
            });

            bouncers.forEach(pad => {
                if (checkCollision(player, pad)) {
                    if (pad.type === "horizontal") {
                        player.y = pad.y - player.radius; player.vy = -Math.max(Math.abs(player.vy) * 1.35, 11 + currentBouncePower); player.vx *= 1.25;
                    } else if (pad.type === "vertical") {
                        if (player.x < pad.x) { player.x = pad.x - player.radius; player.vx = -Math.max(Math.abs(player.vx) * 1.35, 8 + currentBouncePower); } 
                        else { player.x = pad.x + pad.width + player.radius; player.vx = Math.max(Math.abs(player.vx) * 1.35, 8 + currentBouncePower); }
                        player.vy = -Math.max(Math.abs(player.vy) * 0.9, 5);
                    }
                    player.isSwinging = false; player.hookedTo = null;
                }
            });

            if (player.isSwinging && player.hookedTo) {
                let hook = player.hookedTo; let dx = player.x - hook.x; let dy = player.y - hook.y; let currentDist = Math.sqrt(dx * dx + dy * dy);
                if (currentDist > player.ropeLength) {
                    let angle = Math.atan2(dy, dx);
                    player.x = hook.x + Math.cos(angle) * player.ropeLength; player.y = hook.y + Math.sin(angle) * player.ropeLength;
                    let nx = dx / currentDist; let ny = dy / currentDist; let velAlongNormal = player.vx * nx + player.vy * ny;
                    player.vx -= velAlongNormal * nx; player.vy -= velAlongNormal * ny; 
                    
                    let momentumBoost = (equippedSkin === "red") ? 0.2 : 0.14;
                    player.vx += Math.sin(angle) * momentumBoost; 
                }
            }

            cameraX = player.x - 200;
            score = Math.floor(player.x / 10) - 10; scoreDisplay.textContent = score;

            if (player.y > canvas.height + 140) {
                gameStatus = "lost"; 
                if (score > highScore) { highScore = score; highScoreDisplay.textContent = highScore; }
                saveLocalData(); syncCloudSave(); renderShop(); renderChangingRoom();
            }
        }

        function drawDefaultBackground() {
            ctx.fillStyle = "#162447"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-cameraX, 0); ctx.strokeStyle = "#1f4068"; ctx.lineWidth = 1;
            let startGridX = Math.floor(cameraX / 100) * 100;
            for (let i = startGridX; i < startGridX + canvas.width + 200; i += 100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawDefaultBackground();

            ctx.save();
            ctx.translate(-cameraX, 0);

            // Draw Bouncers
            bouncers.forEach(pad => {
                if (pad.type === "horizontal") {
                    ctx.fillStyle = "#e94560"; ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
                    ctx.fillStyle = "#ffdd59"; ctx.fillRect(pad.x + 4, pad.y + 2, pad.width - 8, 3);
                } else if (pad.type === "vertical") {
                    ctx.fillStyle = "#00ffcc"; ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
                    ctx.fillStyle = "#ffffff"; ctx.fillRect(pad.x + 2, pad.y + 4, pad.width - 4, pad.height - 8);
                }
            });

            // Draw Hooks
            hooks.forEach(hook => {
                let isTargeted = (hook === targetHook && !player.isSwinging);
                ctx.fillStyle = isTargeted ? "#4ecca3" : "#e94560";
                ctx.beginPath(); ctx.arc(hook.x, hook.y, 8, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = isTargeted ? "rgba(255, 255, 255, 0.8)" : "rgba(100, 100, 100, 0.3)"; ctx.lineWidth = isTargeted ? 4 : 2;
                ctx.beginPath(); ctx.arc(hook.x, hook.y, 16, 0, Math.PI * 2); ctx.stroke();
                
                // Max range visualization lightly around player
                if (!player.isSwinging && isTargeted) {
                    ctx.strokeStyle = "rgba(78, 204, 163, 0.1)"; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.arc(player.x, player.y, maxHookRange, 0, Math.PI*2); ctx.stroke();
                }
            });

            // Draw Rope
            if (player.isSwinging && player.hookedTo) {
                ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; 
                ctx.beginPath(); ctx.moveTo(player.hookedTo.x, player.hookedTo.y); ctx.lineTo(player.x, player.y); ctx.stroke();
            }

            // Draw Coins
            coinEntities.forEach(c => {
                if (c.collected) return;
                ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(flameOffset);
                ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ffb142"; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("¢", 0, 1);
                ctx.restore();
            });

            // Draw Player & Skins
            ctx.fillStyle = SKINS_CONFIG[equippedSkin] ? SKINS_CONFIG[equippedSkin].color : "#00adb5";
            if (equippedSkin === "og_stickman") { ctx.shadowColor = "#ff00ff"; ctx.shadowBlur = 15; }
            
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            
            // The Exquisite OG details
            if (equippedSkin === "og_stickman") {
                // Monocle
                ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(player.x + 5, player.y - 3, 4, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(player.x + 9, player.y - 3); ctx.lineTo(player.x + 14, player.y + 4); ctx.stroke();
                // Bowtie
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.moveTo(player.x, player.y + 6); ctx.lineTo(player.x - 6, player.y + 3); ctx.lineTo(player.x - 6, player.y + 9); ctx.fill();
                ctx.beginPath(); ctx.moveTo(player.x, player.y + 6); ctx.lineTo(player.x + 6, player.y + 3); ctx.lineTo(player.x + 6, player.y + 9); ctx.fill();
                // Top Hat
                ctx.fillStyle = "#111";
                ctx.fillRect(player.x - 10, player.y - 12, 20, 2);
                ctx.fillRect(player.x - 6, player.y - 24, 12, 12);
                ctx.fillStyle = "#FFD700"; ctx.fillRect(player.x - 6, player.y - 15, 12, 3);
            }

            ctx.restore();

            if (gameStatus === "lost") {
                ctx.fillStyle = "rgba(15, 15, 26, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#e94560"; ctx.font = "bold 42px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px sans-serif"; ctx.fillStyle = "#fff";
                ctx.fillText(`Score: ${score} | Coins: ${coins}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = "#888"; ctx.fillText("Press Space or Click to play again!", canvas.width / 2, canvas.height / 2 + 65);
            }
        }

        manageEnvironment();
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
