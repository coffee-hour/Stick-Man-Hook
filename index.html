<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWING!↺</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            user-select: none;
        }
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        canvas {
            background: #162447;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            cursor: pointer;
        }
        #ui {
            display: flex;
            gap: 30px;
            font-size: 18px;
            font-weight: bold;
            background: rgba(26, 26, 46, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #1f4068;
        }
        .score-val { color: #4ecca3; }
        .high-val { color: #f9a826; }
        .skin-val { color: #00adb5; text-transform: capitalize; }
        
        .clickable-ui {
            cursor: pointer;
            transition: color 0.2s;
        }
        .clickable-ui:hover { color: #fff; }
        
        /* Changing Room Styles */
        #changingRoom {
            background: rgba(22, 36, 71, 0.8);
            border: 1px solid #1f4068;
            border-radius: 8px;
            padding: 15px;
            width: 770px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #changingRoom h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .skins-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-start;
        }
        .skin-btn {
            background: #1a1a2e;
            border: 2px solid #1f4068;
            color: #888;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: not-allowed;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 75px;
            transition: all 0.2s;
            position: relative;
        }
        .skin-btn.unlocked {
            border-color: #4ecca3;
            color: #fff;
            cursor: pointer;
        }
        .skin-btn.unlocked:hover {
            background: #1f4068;
            transform: translateY(-2px);
        }
        .skin-btn.equipped {
            border-color: #f9a826;
            background: #232342;
            color: #f9a826;
        }
        .skin-btn.sub-skin {
            border-style: dashed;
            background: #162447;
            transform: scale(0.95);
        }
        .skin-preview {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .dropdown-arrow {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #f9a826;
            color: #1a1a2e;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .dropdown-arrow:hover { background: #fff; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div>Score: <span id="scoreDisplay" class="score-val">0</span></div>
            <div id="highScoreClickable" class="clickable-ui">High Score: <span id="highScoreDisplay" class="high-val">0</span></div>
            <div id="equippedClickable" class="clickable-ui">Equipped: <span id="skinDisplay" class="skin-val">Default</span></div>
        </div>

        <canvas id="gameCanvas" width="800" height="480"></canvas>

        <div id="changingRoom">
            <h3>👕 Changing Room</h3>
            <div class="skins-grid" id="skinsGrid"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const highScoreDisplay = document.getElementById("highScoreDisplay");
        const skinDisplay = document.getElementById("skinDisplay");
        const highScoreClickable = document.getElementById("highScoreClickable");
        const equippedClickable = document.getElementById("equippedClickable");
        const skinsGrid = document.getElementById("skinsGrid");

        // --- Game Config & Physics ---
        const GRAVITY = 0.42; 
        const FRICTION = 0.996; 
        const MAX_HOOK_RANGE = 370; 

        // --- Game State ---
        let player = {
            x: 100, y: 200, vx: 6, vy: 0, radius: 12,
            isSwinging: false, hookedTo: null, ropeLength: 0
        };

        let hooks = [];
        let bouncers = []; 
        let targetHook = null;
        let cameraX = 0;
        let score = 0;
        let flameOffset = 0; 
        
        let highScore = parseInt(localStorage.getItem("stickman_high_score")) || 0;
        let equippedSkin = localStorage.getItem("stickman_equipped_skin") || "default";
        
        let angelicDropdownOpen = false;
        let devilDropdownOpen = false;
        let gameStatus = "playing";

        // --- Skins Database Config ---
        const SKINS_CONFIG = {
            default: { name: "Default", color: "#00adb5" },
            
            devil: { name: "Devil", color: "#ff0055", condition: "???" }, 
            denied_devil: { name: "Denied Devil", color: "#ff0055", condition: "???", parent: "devil" },
            accurate_devil: { name: "Accurate Devil", color: "#d4af37", condition: "???", parent: "devil" },
            exalted_devil: { name: "Exalted Devil", color: "#ff0055", condition: "???", parent: "devil" },

            brown: { name: "Brown", color: "#8b4513", score: 100 },
            green: { name: "Green", color: "#00ff00", score: 500 },
            pink: { name: "Pink", color: "#ffc0cb", score: 1000 },
            blue: { name: "Blue", color: "#0000ff", score: 5000 },
            red: { name: "Red", color: "#ff0000", score: 7000 },
            orange: { name: "Orange", color: "#ffa500", score: 10000 },
            yellow: { name: "Yellow", color: "#ffff00", score: 20000 },
            gold: { name: "Gold", color: "#d4af37", score: 100000 },
            
            angelic: { name: "Angelic Dev", color: "#ffffff", condition: "Secret Code" },
            denied_angel: { name: "Denied Angel", color: "#ffffff", condition: "???", parent: "angelic" },
            accurate_angel: { name: "Accurate Angel", color: "#ffffff", condition: "???", parent: "angelic" },
            exalted_angel: { name: "Exalted Angel", color: "#ffffff", condition: "???", parent: "angelic" }
        };

        // --- Secret Codes ---
        highScoreClickable.addEventListener("click", () => {
            let code = prompt("ENTER ACCESS CODE:");
            if (code && code.toUpperCase() === "IAMXAVIER") {
                localStorage.setItem("stickman_skin_angelic", "true");
                
                // DENIED DEVIL UNLOCK TRIGGER
                if (equippedSkin.includes("devil") && localStorage.getItem("stickman_skin_denied_devil") !== "true") {
                    localStorage.setItem("stickman_skin_denied_devil", "true");
                    alert("😈 UNLOCKED: DENIED DEVIL (Tried to seek grace while cursed...)");
                } else {
                    alert("😇 ANGELIC DEV MODE UNLOCKED 😇");
                }
                renderChangingRoom();
            } else if (code !== null) {
                alert("ACCESS DENIED.");
            }
        });

        // 100K Teleport Cheat
        equippedClickable.addEventListener("click", () => {
            let code = prompt("ENTER ACCESS CODE:");
            if (code && code.toUpperCase() === "PT") {
                // Teleporting the player 1,000,000 pixels forward equates to a score of 100,000
                player.x = 1000100;
                player.y = 100;
                player.vx = 12;
                player.vy = 0;
                player.isSwinging = false;
                player.hookedTo = null;
                hooks = []; 
                bouncers = [];
                manageEnvironment();
                alert("⏩ WARP SPEED ENGAGED: 100,000 POINTS");
            }
        });

        function checkUnlockStatus(key) {
            if (key === "default") return true;
            if (SKINS_CONFIG[key].condition && SKINS_CONFIG[key].score === undefined) {
                return localStorage.getItem(`stickman_skin_${key}`) === "true";
            }
            return highScore >= SKINS_CONFIG[key].score;
        }

        // --- Render UI Layout ---
        function renderChangingRoom() {
            skinsGrid.innerHTML = "";
            
            const hasAngelSubSkins = checkUnlockStatus("denied_angel") || checkUnlockStatus("accurate_angel") || checkUnlockStatus("exalted_angel");
            const hasDevilSubSkins = checkUnlockStatus("denied_devil") || checkUnlockStatus("accurate_devil") || checkUnlockStatus("exalted_devil");

            Object.keys(SKINS_CONFIG).forEach(key => {
                const skin = SKINS_CONFIG[key];
                
                if (skin.parent === "angelic" && !angelicDropdownOpen) return;
                if (skin.parent === "devil" && !devilDropdownOpen) return;

                const isUnlocked = checkUnlockStatus(key);
                const isEquipped = equippedSkin === key;

                const btn = document.createElement("button");
                btn.className = `skin-btn ${isUnlocked ? 'unlocked' : ''} ${isEquipped ? 'equipped' : ''}`;
                if (skin.parent) btn.classList.add("sub-skin");
                
                const preview = document.createElement("span");
                preview.className = "skin-preview";
                preview.style.backgroundColor = skin.color;
                
                // Visual Flairs
                if (key === "denied_angel" || key === "denied_devil") preview.style.borderColor = "red";
                if (key === "exalted_angel" || key === "accurate_devil") preview.style.boxShadow = "0 0 5px #f9a826";
                if (key === "exalted_devil") preview.style.boxShadow = "0 0 5px #ff0055";

                btn.appendChild(preview);
                
                const nameLabel = document.createElement("span");
                nameLabel.textContent = skin.name;
                btn.appendChild(nameLabel);

                const infoLabel = document.createElement("span");
                infoLabel.style.fontSize = "9px";
                infoLabel.style.color = "#666";
                if (skin.score !== undefined) infoLabel.textContent = `Score: ${skin.score}`;
                else if (skin.condition) infoLabel.textContent = skin.condition;
                btn.appendChild(infoLabel);

                // Angelic Dropdown
                if (key === "angelic" && isUnlocked && hasAngelSubSkins) {
                    const arrow = document.createElement("div");
                    arrow.className = "dropdown-arrow";
                    arrow.textContent = angelicDropdownOpen ? "▲" : "▼";
                    arrow.addEventListener("click", (e) => {
                        e.stopPropagation(); 
                        angelicDropdownOpen = !angelicDropdownOpen;
                        renderChangingRoom();
                    });
                    btn.appendChild(arrow);
                }
                
                // Devil Dropdown
                if (key === "devil" && isUnlocked && hasDevilSubSkins) {
                    const arrow = document.createElement("div");
                    arrow.className = "dropdown-arrow";
                    arrow.textContent = devilDropdownOpen ? "▲" : "▼";
                    arrow.addEventListener("click", (e) => {
                        e.stopPropagation(); 
                        devilDropdownOpen = !devilDropdownOpen;
                        renderChangingRoom();
                    });
                    btn.appendChild(arrow);
                }

                if (isUnlocked) {
                    btn.addEventListener("click", () => {
                        equippedSkin = key;
                        localStorage.setItem("stickman_equipped_skin", key);
                        skinDisplay.textContent = skin.name;
                        skinDisplay.style.color = skin.color;
                        renderChangingRoom();
                    });
                }
                skinsGrid.appendChild(btn);
            });

            skinDisplay.textContent = SKINS_CONFIG[equippedSkin].name;
            skinDisplay.style.color = SKINS_CONFIG[equippedSkin].color;
        }

        highScoreDisplay.textContent = highScore;
        renderChangingRoom();

        // --- Controls Scopes ---
        canvas.addEventListener("mousedown", handleActionStart);
        window.addEventListener("mouseup", handleActionEnd);
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleActionStart(); }, { passive: false });
        window.addEventListener("touchend", (e) => { e.preventDefault(); handleActionEnd(); }, { passive: false });
        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); handleActionStart(); } });
        window.addEventListener("keyup", (e) => { if (e.code === "Space") handleActionEnd(); });

        function handleActionStart() {
            if (gameStatus !== "playing") { resetGame(); return; }
            if (targetHook && !player.isSwinging) {
                let dx = targetHook.x - player.x;
                let dy = targetHook.y - player.y;
                player.isSwinging = true;
                player.hookedTo = targetHook;
                player.ropeLength = Math.sqrt(dx * dx + dy * dy);
            }
        }

        function handleActionEnd() {
            player.isSwinging = false;
            player.hookedTo = null;
        }

        // --- Procedural Generation ---
        function manageEnvironment() {
            if (hooks.length === 0) hooks.push({ x: player.x + 200, y: 160 });

            let lastHook = hooks[hooks.length - 1];
            while (lastHook.x < player.x + 1000) {
                let nextX = lastHook.x + Math.floor(Math.random() * 100) + 190; 
                let nextY = Math.floor(Math.random() * 130) + 100; 
                hooks.push({ x: nextX, y: nextY });

                let rand = Math.random();
                if (rand < 0.35) {
                    bouncers.push({ type: "horizontal", x: nextX - 50, y: 430, width: 65, height: 12 });
                } else if (rand < 0.55) {
                    bouncers.push({ type: "vertical", x: nextX - 110, y: nextY + 50, width: 14, height: 80 });
                }
                lastHook = hooks[hooks.length - 1];
            }

            hooks = hooks.filter(h => h.x > cameraX - 100);
            bouncers = bouncers.filter(b => b.x > cameraX - 100);
        }

        function findClosestTarget() {
            let closestHook = null;
            let minDist = Infinity;
            hooks.forEach(hook => {
                let dx = hook.x - player.x;
                let dy = hook.y - player.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist && hook.x > player.x - 30 && dist < MAX_HOOK_RANGE) {
                    minDist = dist; closestHook = hook;
                }
            });
            targetHook = closestHook;
        }

        function checkCollision(circle, rect) {
            let closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
            let closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
            let dx = circle.x - closestX;
            let dy = circle.y - closestY;
            return (dx * dx + dy * dy) < (circle.radius * circle.radius);
        }

        function resetGame() {
            player.x = 100; player.y = 200; player.vx = 6; player.vy = 0;
            player.isSwinging = false; player.hookedTo = null;
            hooks = []; bouncers = []; score = 0;
            scoreDisplay.textContent = 0;
            manageEnvironment();
            gameStatus = "playing";
        }

        // --- Core Update Loop ---
        function update() {
            if (gameStatus !== "playing") return;

            player.vy += GRAVITY;
            player.vx *= FRICTION;
            player.vy *= FRICTION;
            player.x += player.vx;
            player.y += player.vy;

            manageEnvironment();
            if (!player.isSwinging) findClosestTarget();

            flameOffset += 0.15;

            bouncers.forEach(pad => {
                if (checkCollision(player, pad)) {
                    if (pad.type === "horizontal") {
                        player.y = pad.y - player.radius;
                        player.vy = -Math.max(Math.abs(player.vy) * 1.35, 11);
                        player.vx *= 1.25;
                    } else if (pad.type === "vertical") {
                        if (player.x < pad.x) {
                            player.x = pad.x - player.radius;
                            player.vx = -Math.max(Math.abs(player.vx) * 1.35, 8);
                        } else {
                            player.x = pad.x + pad.width + player.radius;
                            player.vx = Math.max(Math.abs(player.vx) * 1.35, 8);
                        }
                        player.vy = -Math.max(Math.abs(player.vy) * 0.9, 5);
                    }
                    player.isSwinging = false;
                    player.hookedTo = null;
                }
            });

            if (player.isSwinging && player.hookedTo) {
                let hook = player.hookedTo;
                let dx = player.x - hook.x;
                let dy = player.y - hook.y;
                let currentDist = Math.sqrt(dx * dx + dy * dy);

                if (currentDist > player.ropeLength) {
                    let angle = Math.atan2(dy, dx);
                    player.x = hook.x + Math.cos(angle) * player.ropeLength;
                    player.y = hook.y + Math.sin(angle) * player.ropeLength;

                    let nx = dx / currentDist;
                    let ny = dy / currentDist;
                    let velAlongNormal = player.vx * nx + player.vy * ny;

                    player.vx -= velAlongNormal * nx;
                    player.vy -= velAlongNormal * ny;
                    player.vx += Math.sin(angle) * 0.14; 
                }
            }

            cameraX = player.x - 200;
            score = Math.floor(player.x / 10) - 10;
            scoreDisplay.textContent = score;

            // EXALTED THRESHOLDS 
            if (score >= 10000) {
                if (equippedSkin.includes("angel") && localStorage.getItem("stickman_skin_exalted_angel") !== "true") {
                    localStorage.setItem("stickman_skin_exalted_angel", "true");
                    alert("✨ UNLOCKED: EXALTED ANGEL!");
                    renderChangingRoom();
                }
                if (equippedSkin.includes("devil") && localStorage.getItem("stickman_skin_exalted_devil") !== "true") {
                    localStorage.setItem("stickman_skin_exalted_devil", "true");
                    alert("🔥 UNLOCKED: EXALTED DEVIL!");
                    renderChangingRoom();
                }
            }

            // Defeat Line Logic
            if (player.y > canvas.height + 140) {
                gameStatus = "lost";

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("stickman_high_score", highScore);
                    highScoreDisplay.textContent = highScore;
                }

                // DEVIL: Base Negative
                if (score < 0 && localStorage.getItem("stickman_skin_devil") !== "true") {
                    localStorage.setItem("stickman_skin_devil", "true");
                    alert("👹 UNLOCKED: THE DEVIL SKIN!");
                }

                // DENIED ANGEL
                if (score < 0 && equippedSkin.includes("angel") && localStorage.getItem("stickman_skin_denied_angel") !== "true") {
                    localStorage.setItem("stickman_skin_denied_angel", "true");
                    alert("🥀 UNLOCKED: DENIED ANGEL");
                }

                // ACCURATE DEATH TRACKERS
                if (equippedSkin.includes("angel")) {
                    let angelDeaths = parseInt(localStorage.getItem("stickman_angelic_deaths") || "0") + 1;
                    localStorage.setItem("stickman_angelic_deaths", angelDeaths);
                    if (angelDeaths >= 20 && localStorage.getItem("stickman_skin_accurate_angel") !== "true") {
                        localStorage.setItem("stickman_skin_accurate_angel", "true");
                        alert("👁️ UNLOCKED: ACCURATE ANGEL");
                    }
                }
                
                if (equippedSkin.includes("devil")) {
                    let devilDeaths = parseInt(localStorage.getItem("stickman_devil_deaths") || "0") + 1;
                    localStorage.setItem("stickman_devil_deaths", devilDeaths);
                    if (devilDeaths >= 20 && localStorage.getItem("stickman_skin_accurate_devil") !== "true") {
                        localStorage.setItem("stickman_skin_accurate_devil", "true");
                        alert("🎩 UNLOCKED: ACCURATE DEVIL");
                    }
                }

                renderChangingRoom();
            }
        }

        // --- Visual Renderers ---
        function drawDevilBackground() {
            let baseGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            baseGrad.addColorStop(0, "#0b0005"); baseGrad.addColorStop(0.7, "#22000b"); baseGrad.addColorStop(1, "#4a0010");
            ctx.fillStyle = baseGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(233, 69, 96, 0.18)";
            for (let i = 0; i < canvas.width + 100; i += 40) {
                let flameHeight = 80 + Math.sin((i / 20) + flameOffset) * 25;
                ctx.beginPath(); ctx.moveTo(i, canvas.height);
                ctx.quadraticCurveTo(i + 20, canvas.height - flameHeight, i + 40, canvas.height); ctx.fill();
            }
        }

        function drawAngelicBackground() {
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, "#74b9ff"); skyGrad.addColorStop(0.6, "#a29bfe"); skyGrad.addColorStop(1, "#dfe6e9");
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let sunX = canvas.width / 2; let sunY = -20;
            ctx.fillStyle = "rgba(255, 255, 210, 0.08)";
            for (let i = 0; i < Math.PI * 2; i += Math.PI / 8) {
                ctx.beginPath(); ctx.moveTo(sunX, sunY); ctx.arc(sunX, sunY, 900, i - 0.1, i + 0.1); ctx.fill();
            }
            ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
            function drawCloud(cx, cy, scale) {
                ctx.beginPath();
                ctx.arc(cx, cy, 30 * scale, 0, Math.PI * 2);
                ctx.arc(cx + 25 * scale, cy - 10 * scale, 40 * scale, 0, Math.PI * 2);
                ctx.arc(cx + 60 * scale, cy, 30 * scale, 0, Math.PI * 2); ctx.fill();
            }
            drawCloud(100, 120, 1.2); drawCloud(450, 80, 1.5); drawCloud(680, 160, 1);
        }

        function drawDefaultBackground() {
            ctx.fillStyle = "#162447"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-cameraX, 0); ctx.strokeStyle = "#1f4068"; ctx.lineWidth = 1;
            let startGridX = Math.floor(cameraX / 100) * 100;
            for (let i = startGridX; i < startGridX + canvas.width + 200; i += 100) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            ctx.restore();
        }

        function drawHalo(x, y, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.ellipse(x, y - 20, 14, 4, 0, 0, Math.PI * 2); ctx.stroke();
        }

        function draw() {
            if (equippedSkin.includes("devil")) drawDevilBackground();
            else if (equippedSkin.includes("angel")) drawAngelicBackground();
            else drawDefaultBackground();

            ctx.save();
            ctx.translate(-cameraX, 0);

            // Draw Bounce Elements
            bouncers.forEach(pad => {
                if (pad.type === "horizontal") {
                    ctx.fillStyle = "#e94560"; ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
                    ctx.fillStyle = "#ffdd59"; ctx.fillRect(pad.x + 4, pad.y + 2, pad.width - 8, 3);
                } else if (pad.type === "vertical") {
                    ctx.fillStyle = "#00ffcc"; ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
                    ctx.fillStyle = "#ffffff"; ctx.fillRect(pad.x + 2, pad.y + 4, pad.width - 4, pad.height - 8);
                }
            });

            // Draw Hooks
            hooks.forEach(hook => {
                let isTargeted = (hook === targetHook && !player.isSwinging);
                
                if (equippedSkin.includes("devil") || equippedSkin === "denied_angel") ctx.fillStyle = "#ff0055";
                else if (equippedSkin.includes("angel")) ctx.fillStyle = "#fab1a0";
                else ctx.fillStyle = isTargeted ? "#4ecca3" : "#e94560";
                
                ctx.beginPath(); ctx.arc(hook.x, hook.y, 8, 0, Math.PI * 2); ctx.fill();
                
                ctx.strokeStyle = isTargeted ? "rgba(78, 204, 163, 0.5)" : "rgba(233, 69, 96, 0.2)";
                ctx.lineWidth = isTargeted ? 4 : 2;
                ctx.beginPath(); ctx.arc(hook.x, hook.y, 16, 0, Math.PI * 2); ctx.stroke();

                if (isTargeted) {
                    ctx.strokeStyle = equippedSkin.includes("angel") && equippedSkin !== "denied_angel" ? "#ffffff" : "#4ecca3";
                    ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
                    ctx.beginPath(); ctx.arc(hook.x, hook.y, 25, 0, Math.PI * 2); ctx.stroke();
                    ctx.setLineDash([]);
                }
            });

            // Rope styles
            if (player.isSwinging && player.hookedTo) {
                if (equippedSkin.includes("devil") || equippedSkin === "denied_angel") {
                    ctx.strokeStyle = "#ff0055"; ctx.shadowColor = "#ff0055"; ctx.shadowBlur = 10; ctx.lineWidth = 3.5;
                } else if (equippedSkin.includes("angel")) {
                    ctx.strokeStyle = "#ffeaa7"; ctx.lineWidth = 3;
                } else {
                    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3;
                }
                ctx.beginPath(); ctx.moveTo(player.hookedTo.x, player.hookedTo.y); ctx.lineTo(player.x, player.y); ctx.stroke();
                ctx.shadowBlur = 0; 
            }

            // Exalted Angel Aura & Wings
            if (equippedSkin === "exalted_angel") {
                ctx.shadowColor = "#ffeaa7"; ctx.shadowBlur = 15;
                ctx.strokeStyle = "rgba(255, 234, 167, 0.7)"; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(player.x, player.y, player.radius + 6, 0, Math.PI * 2); ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.beginPath(); ctx.moveTo(player.x - 6, player.y); ctx.quadraticCurveTo(player.x - 25, player.y - 18, player.x - 30, player.y - 5); ctx.quadraticCurveTo(player.x - 20, player.y + 12, player.x - 8, player.y + 4); ctx.fill();
                ctx.beginPath(); ctx.moveTo(player.x + 6, player.y); ctx.quadraticCurveTo(player.x + 25, player.y - 18, player.x + 30, player.y - 5); ctx.quadraticCurveTo(player.x + 20, player.y + 12, player.x + 8, player.y + 4); ctx.fill();
            }
            
            // Exalted Devil Spikey Tail
            if (equippedSkin === "exalted_devil") {
                ctx.strokeStyle = "#8b0000"; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(player.x - 8, player.y + 5); 
                ctx.quadraticCurveTo(player.x - 25, player.y + 15, player.x - 20, player.y - 8); ctx.stroke();
                
                ctx.fillStyle = "#8b0000";
                ctx.beginPath(); ctx.moveTo(player.x - 20, player.y - 10); ctx.lineTo(player.x - 25, player.y - 4); ctx.lineTo(player.x - 15, player.y - 4); ctx.fill();
            }

            // Draw Player Blob
            ctx.fillStyle = SKINS_CONFIG[equippedSkin].color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();

            // Accessory Layering
            if (equippedSkin === "angelic" || equippedSkin === "accurate_angel" || equippedSkin === "exalted_angel" || equippedSkin === "denied_devil") {
                drawHalo(player.x, player.y, "#ffeaa7");
            }
            if (equippedSkin === "denied_angel") {
                drawHalo(player.x, player.y, "#ff0055");
            }
            
            // Devil Horns
            if (equippedSkin === "devil" || equippedSkin === "exalted_devil") {
                ctx.fillStyle = "#ff0055";
                ctx.beginPath(); ctx.moveTo(player.x - 8, player.y - 8); ctx.lineTo(player.x - 14, player.y - 18); ctx.lineTo(player.x - 2, player.y - 11); ctx.fill();
                ctx.beginPath(); ctx.moveTo(player.x + 8, player.y - 8); ctx.lineTo(player.x + 14, player.y - 18); ctx.lineTo(player.x + 2, player.y - 11); ctx.fill();
            }
            
            // Denied Devil Extras
            if (equippedSkin === "denied_devil") {
                // Floppy Red Ears
                ctx.fillStyle = "#cc0044";
                ctx.beginPath(); ctx.ellipse(player.x - 10, player.y + 2, 3, 9, Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(player.x + 10, player.y + 2, 3, 9, -Math.PI/4, 0, Math.PI*2); ctx.fill();
                // White Eyes
                ctx.fillStyle = "#ffffff";
                ctx.beginPath(); ctx.arc(player.x - 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(player.x + 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
            }
            
            // Accurate Devil Extras
            if (equippedSkin === "accurate_devil") {
                // Tuxedo Base
                ctx.fillStyle = "#111111";
                ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI); ctx.fill();
                // White undershirt V-neck
                ctx.fillStyle = "#ffffff";
                ctx.beginPath(); ctx.moveTo(player.x - 5, player.y - 3); ctx.lineTo(player.x + 5, player.y - 3); ctx.lineTo(player.x, player.y + 4); ctx.fill();
                // Red Bowtie
                ctx.fillStyle = "#ff0000";
                ctx.beginPath(); ctx.moveTo(player.x - 4, player.y - 2); ctx.lineTo(player.x, player.y); ctx.lineTo(player.x - 4, player.y + 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(player.x + 4, player.y - 2); ctx.lineTo(player.x, player.y); ctx.lineTo(player.x + 4, player.y + 2); ctx.fill();
                // Red Eyes
                ctx.fillStyle = "#ff0000";
                ctx.beginPath(); ctx.arc(player.x - 4, player.y - 5, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(player.x + 4, player.y - 5, 2, 0, Math.PI*2); ctx.fill();
            }
            
            // Exalted Devil Extras
            if (equippedSkin === "exalted_devil") {
                // Crimson Pitchfork in Hand
                ctx.strokeStyle = "#8b0000"; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(player.x + 8, player.y + 6); ctx.lineTo(player.x + 22, player.y - 12); ctx.stroke(); // Shaft
                ctx.beginPath(); ctx.moveTo(player.x + 16, player.y - 9); ctx.lineTo(player.x + 19, player.y - 16); ctx.lineTo(player.x + 26, player.y - 12); ctx.stroke(); // Prongs
                ctx.fillStyle = "#8b0000"; ctx.beginPath(); ctx.arc(player.x + 23, player.y - 13, 1.2, 0, Math.PI*2); ctx.fill(); // Center Point
                
                // Black Eyes
                ctx.fillStyle = "#000000";
                ctx.beginPath(); ctx.arc(player.x - 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(player.x + 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
            }
            
            // Denied Angel Eyes
            if (equippedSkin === "denied_angel") {
                ctx.fillStyle = "#ff0055";
                ctx.beginPath(); ctx.arc(player.x - 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(player.x + 4, player.y - 2, 2.5, 0, Math.PI*2); ctx.fill();
            }
            
            // Accurate Angel Eyes
            if (equippedSkin === "accurate_angel") {
                ctx.fillStyle = "#000000";
                let eyePos = [[-5, -4], [0, -6], [5, -4], [-4, 3], [4, 3], [0, 6]];
                eyePos.forEach(p => {
                    ctx.beginPath(); ctx.arc(player.x + p[0], player.y + p[1], 1.8, 0, Math.PI*2); ctx.fill();
                });
            }

            ctx.restore();

            if (gameStatus === "lost") {
                ctx.fillStyle = "rgba(15, 15, 26, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = score < 0 ? "#ff0055" : "#e94560";
                ctx.font = "bold 42px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(score < 0 ? "UNDERWORLD DESCENT" : "GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px sans-serif"; ctx.fillStyle = "#fff";
                ctx.fillText(`Final Score: ${score} points`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = "#888";
                ctx.fillText("Press Space or Click the arena to snap back in!", canvas.width / 2, canvas.height / 2 + 65);
            }
        }

        manageEnvironment();
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
